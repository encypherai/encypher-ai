name: Sync Design System

on:
  push:
    paths:
      - 'packages/design-system/**'
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-design-system:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Sync design-system to marketing-site
        run: |
          rm -rf apps/marketing-site/design-system
          cp -r packages/design-system apps/marketing-site/design-system
          echo "✅ Synced to marketing-site"
      
      - name: Sync design-system to dashboard
        run: |
          rm -rf apps/dashboard/design-system
          cp -r packages/design-system apps/dashboard/design-system
          echo "✅ Synced to dashboard"
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet || echo "changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add apps/*/design-system/
          git commit -m "chore: Sync design-system to frontend apps [skip ci]"
          git push
