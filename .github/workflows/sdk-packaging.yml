name: SDK Packaging Validation

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'sdk/**'
      - '.github/workflows/sdk-packaging.yml'
  push:
    branches: [main, develop]
    paths:
      - 'sdk/**'
      - '.github/workflows/sdk-packaging.yml'
  workflow_dispatch:

jobs:
  packaging:
    name: Validate SDK packaging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Python package (sdist + wheel)
        working-directory: sdk/python
        run: |
          uv build

      - name: Build and pack TypeScript package
        working-directory: sdk/typescript
        run: |
          npm install
          npm run build
          npm pack --dry-run

      - name: Go module sanity
        working-directory: sdk/go
        run: |
          go mod tidy
          go build ./...

      - name: Cargo package (dry-run)
        working-directory: sdk/rust
        run: |
          cargo package
