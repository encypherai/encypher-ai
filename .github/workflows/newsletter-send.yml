name: Newsletter Send on New Post

on:
  push:
    branches: [main]
    paths:
      - 'apps/marketing-site/src/content/blog/**.md'

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find newly added blog post
        id: find-post
        run: |
          NEW_FILE=$(git diff --diff-filter=A --name-only HEAD~1 HEAD -- apps/marketing-site/src/content/blog/ | head -1)
          echo "new_file=$NEW_FILE" >> "$GITHUB_OUTPUT"
          if [ -z "$NEW_FILE" ]; then
            echo "No new blog post found (edit-only push). Skipping."
          else
            echo "New post: $NEW_FILE"
          fi

      - name: Set up Node.js
        if: steps.find-post.outputs.new_file != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.find-post.outputs.new_file != ''
        run: npm install gray-matter

      - name: Wait for post to go live
        if: steps.find-post.outputs.new_file != ''
        env:
          NEW_FILE: ${{ steps.find-post.outputs.new_file }}
        run: |
          RAW_SLUG=$(basename "$NEW_FILE" .md)
          SLUG=$(echo "$RAW_SLUG" | tr '[:upper:]' '[:lower:]' | sed 's/[[:space:]]/-/g')
          POST_URL="https://encypher.com/blog/${SLUG}"
          echo "Waiting for $POST_URL to go live..."
          MAX_ATTEMPTS=15
          ATTEMPT=0
          until curl -sf -o /dev/null "$POST_URL"; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "Post not live after ${MAX_ATTEMPTS} min — sending newsletter anyway."
              break
            fi
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: not live yet, retrying in 60s..."
            sleep 60
          done
          echo "Post is live (or timeout reached). Proceeding with broadcast."

      - name: Parse frontmatter and broadcast
        if: steps.find-post.outputs.new_file != ''
        env:
          NEW_FILE: ${{ steps.find-post.outputs.new_file }}
          WEB_SERVICE_URL: ${{ secrets.WEB_SERVICE_URL }}
          NEWSLETTER_BROADCAST_SECRET: ${{ secrets.NEWSLETTER_BROADCAST_SECRET }}
        run: node scripts/newsletter/broadcast.js
