name: Automated Blog Writer

# Schedule disabled - runs locally via cron on the dev machine.
# Manual trigger still available for one-off posts or emergency use.
on:
  workflow_dispatch:
    inputs:
      topic_hint:
        description: 'Optional topic override (leave blank to auto-select from TOPICS.md)'
        required: false
        type: string

jobs:
  write-blog-post:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude CLI and jq
        run: |
          npm install -g @anthropic-ai/claude-code
          sudo apt-get install -y jq

      - name: Configure git
        run: |
          git config user.name "Encypher Blog Bot"
          git config user.email "bot@encypherai.com"

      - name: Create .env.skills for image generation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env.skills
            echo "Image generation enabled."
          else
            echo "GEMINI_API_KEY secret not set -- image generation will be skipped."
          fi

      - name: Run blog writer pipeline
        id: blog-writer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOPIC_HINT="${{ inputs.topic_hint }}"
          if [ -n "$TOPIC_HINT" ]; then
            bash scripts/agents/blog-writer/run.sh "$TOPIC_HINT"
          else
            bash scripts/agents/blog-writer/run.sh
          fi

      - name: Notify reviewer on draft PR
        if: steps.blog-writer.outputs.draft_pr_url != ''
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          PR_URL: ${{ steps.blog-writer.outputs.draft_pr_url }}
        run: |
          python3 scripts/agents/blog-writer/notify-reviewer.py

      - name: Clean up .env.skills
        if: always()
        run: rm -f .env.skills
