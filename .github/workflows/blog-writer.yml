name: Automated Blog Writer

# Runs every Tuesday at 14:00 UTC (9:00 AM EST)
# Manual trigger available for testing or one-off posts
on:
  schedule:
    - cron: '0 14 * * 2'
  workflow_dispatch:
    inputs:
      topic_hint:
        description: 'Optional topic override (leave blank to auto-select from TOPICS.md)'
        required: false
        type: string

jobs:
  write-blog-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js (for claude CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "Encypher Blog Bot"
          git config user.email "bot@encypherai.com"

      - name: Create branch
        id: branch
        run: |
          TODAY=$(date +%Y-%m-%d)
          BRANCH="blog/auto-$TODAY"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

          # Skip if branch already exists (idempotent)
          if git ls-remote --exit-code --heads origin "$BRANCH"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            git checkout -b "$BRANCH"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run blog writer agent
        if: steps.branch.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY="${{ steps.branch.outputs.today }}"
          TOPIC_HINT="${{ inputs.topic_hint }}"

          # Build prompt with date substitution
          PROMPT=$(sed "s/CURRENT_DATE/$TODAY/g" scripts/agents/blog-writer/AGENT_PROMPT.md)

          if [ -n "$TOPIC_HINT" ]; then
            PROMPT="$PROMPT

## OVERRIDE: Requested Topic
The operator has requested you write about: \"$TOPIC_HINT\"
Use this instead of selecting from TOPICS.md, but still follow all other instructions."
          fi

          echo "$PROMPT" | claude --dangerously-skip-permissions -p -

      - name: Verify output and push
        if: steps.branch.outputs.skip == 'false'
        run: |
          BLOG_DIR="apps/marketing-site/src/content/blog"

          # Check for new files (agent should have committed, but stage any missed files)
          git add "$BLOG_DIR" 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(blog): auto-stage from agent run ${{ steps.branch.outputs.today }}"
          fi

          # Verify at least one new file was added
          NEW_COUNT=$(git diff --name-only origin/main -- "$BLOG_DIR" | wc -l)
          if [ "$NEW_COUNT" -eq 0 ]; then
            echo "ERROR: No new blog post detected. Agent may have failed."
            exit 1
          fi

          git push origin "${{ steps.branch.outputs.branch }}"

      - name: Open draft PR
        if: steps.branch.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          POST_TITLE=$(git log --oneline -1 | sed 's/^[a-f0-9]* //')
          TODAY="${{ steps.branch.outputs.today }}"

          gh pr create \
            --title "Blog: $POST_TITLE" \
            --body "## Automated Weekly Blog Post

Generated by the blog-writer agent on $TODAY.

**Review checklist before merging:**
- [ ] Title and excerpt are accurate and SEO-optimized
- [ ] All cited sources load correctly
- [ ] Encypher positioning is accurate
- [ ] No fabricated statistics or quotes
- [ ] Word count is 1,400+
- [ ] Tags are relevant

---
*Generated by GitHub Actions \`blog-writer.yml\`*" \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --draft

      - name: Already exists (skipped)
        if: steps.branch.outputs.skip == 'true'
        run: echo "Branch already exists for today. No action taken."
