name: Sync Icons

on:
  push:
    paths:
      - 'packages/icons/**'
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-icons:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync icons to dashboard
        run: |
          rm -rf apps/dashboard/icons
          cp -r packages/icons apps/dashboard/icons
          rm -rf apps/dashboard/icons/node_modules
          echo "Synced to dashboard"

      - name: Sync icons to marketing-site
        run: |
          rm -rf apps/marketing-site/icons
          cp -r packages/icons apps/marketing-site/icons
          rm -rf apps/marketing-site/icons/node_modules
          echo "Synced to marketing-site"

      - name: Sync icons to encypher-times
        run: |
          rm -rf apps/encypher-times/icons
          cp -r packages/icons apps/encypher-times/icons
          rm -rf apps/encypher-times/icons/node_modules
          echo "Synced to encypher-times"

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add apps/*/icons/
          git commit -m "chore: sync @encypher/icons to frontend apps [skip ci]"
          git push
