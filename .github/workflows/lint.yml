name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ruff:
    name: Ruff Linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Ruff on services
        run: |
          echo "Checking all microservices..."
          for service in services/*/; do
            if [ -d "$service/app" ]; then
              echo "Checking $service..."
              uvx ruff check "$service" --output-format=github
            fi
          done

      - name: Run Ruff on enterprise_api
        run: |
          echo "Checking enterprise_api..."
          uvx ruff check enterprise_api --output-format=github
