name: Next.js Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/dashboard/**'
      - 'apps/marketing-site/**'
      - 'apps/ap-demo/**'
      - 'packages/pricing-config/**'
      - 'packages/design-system/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - 'apps/marketing-site/**'
      - 'apps/ap-demo/**'
      - 'packages/pricing-config/**'
      - 'packages/design-system/**'

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      marketing: ${{ steps.filter.outputs.marketing }}
      ap-demo: ${{ steps.filter.outputs.ap-demo }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'apps/dashboard/**'
              - 'packages/pricing-config/**'
              - 'packages/design-system/**'
            marketing:
              - 'apps/marketing-site/**'
              - 'packages/pricing-config/**'
              - 'packages/design-system/**'
            ap-demo:
              - 'apps/ap-demo/**'
              - 'packages/design-system/**'

  build-dashboard:
    name: Dashboard
    needs: detect-changes
    if: needs.detect-changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dependencies
        run: cd apps/dashboard && npm ci

      - name: Type check
        run: cd apps/dashboard && npx tsc --noEmit

      - name: Build
        run: cd apps/dashboard && npm run build

  build-marketing:
    name: Marketing Site
    needs: detect-changes
    if: needs.detect-changes.outputs.marketing == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/marketing-site/package-lock.json

      - name: Install dependencies
        run: cd apps/marketing-site && npm ci

      - name: Type check
        run: cd apps/marketing-site && npx tsc --noEmit

      - name: Build
        run: cd apps/marketing-site && npm run build

  build-ap-demo:
    name: AP Demo
    needs: detect-changes
    if: needs.detect-changes.outputs.ap-demo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/ap-demo/package-lock.json

      - name: Install dependencies
        run: cd apps/ap-demo && npm ci

      - name: Build
        run: cd apps/ap-demo && npm run build
