name: SDK Generation

on:
  push:
    branches: [main, develop]
    paths:
      # Trigger when API routes or models change
      - 'enterprise_api/app/api/**'
      - 'enterprise_api/app/models/**'
      - 'enterprise_api/app/schemas/**'
      # Or when SDK generation scripts change
      - 'sdk/generate_*.py'
      - 'sdk/README.md'
  pull_request:
    branches: [main, develop]
    paths:
      - 'enterprise_api/app/api/**'
      - 'enterprise_api/app/models/**'
      - 'enterprise_api/app/schemas/**'
      - 'sdk/generate_*.py'
  workflow_dispatch:
    inputs:
      languages:
        description: 'Languages to generate (python, typescript, go, rust, all)'
        required: false
        default: 'all'

jobs:
  check-api-changes:
    name: Check for API Changes
    runs-on: ubuntu-latest
    outputs:
      api_changed: ${{ steps.check.outputs.api_changed }}
      spec_hash: ${{ steps.hash.outputs.spec_hash }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to compare
      
      - name: Check if API files changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^enterprise_api/app/(api|models|schemas)/'; then
            echo "api_changed=true" >> $GITHUB_OUTPUT
            echo "API files changed, will regenerate SDKs"
          else
            echo "api_changed=false" >> $GITHUB_OUTPUT
            echo "No API changes detected"
          fi
      
      - name: Calculate spec hash
        id: hash
        run: |
          if [ -f sdk/openapi.public.json ]; then
            echo "spec_hash=$(sha256sum sdk/openapi.public.json | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          else
            echo "spec_hash=none" >> $GITHUB_OUTPUT
          fi

  regenerate-spec:
    name: Regenerate OpenAPI Spec
    runs-on: ubuntu-latest
    needs: check-api-changes
    if: needs.check-api-changes.outputs.api_changed == 'true' || github.event_name == 'workflow_dispatch'
    outputs:
      spec_changed: ${{ steps.compare.outputs.spec_changed }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync
      
      - name: Generate OpenAPI spec
        run: uv run python sdk/generate_openapi.py
      
      - name: Compare spec hash
        id: compare
        run: |
          NEW_HASH=$(sha256sum sdk/openapi.public.json | cut -d' ' -f1)
          OLD_HASH="${{ needs.check-api-changes.outputs.spec_hash }}"
          if [ "$NEW_HASH" != "$OLD_HASH" ]; then
            echo "spec_changed=true" >> $GITHUB_OUTPUT
            echo "OpenAPI spec changed, will regenerate SDKs"
          else
            echo "spec_changed=false" >> $GITHUB_OUTPUT
            echo "OpenAPI spec unchanged"
          fi
      
      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-specs
          path: |
            sdk/openapi.public.json
            sdk/openapi.internal.json
          retention-days: 1

  generate-sdks:
    name: Generate SDKs
    runs-on: ubuntu-latest
    needs: regenerate-spec
    if: needs.regenerate-spec.outputs.spec_changed == 'true' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download OpenAPI spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-specs
          path: sdk/
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Install Python dependencies
        run: uv sync
      
      - name: Install openapi-generator-cli
        run: npm install -g @openapitools/openapi-generator-cli
      
      - name: Determine languages
        id: langs
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "languages=${{ github.event.inputs.languages }}" >> $GITHUB_OUTPUT
          else
            echo "languages=all" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate SDKs
        run: uv run python sdk/generate_sdk.py ${{ steps.langs.outputs.languages }}
      
      - name: Upload Python SDK
        uses: actions/upload-artifact@v4
        with:
          name: sdk-python
          path: sdk/python/
          retention-days: 30
      
      - name: Upload TypeScript SDK
        uses: actions/upload-artifact@v4
        with:
          name: sdk-typescript
          path: sdk/typescript/
          retention-days: 30
      
      - name: Upload Go SDK
        uses: actions/upload-artifact@v4
        with:
          name: sdk-go
          path: sdk/go/
          retention-days: 30
      
      - name: Upload Rust SDK
        uses: actions/upload-artifact@v4
        with:
          name: sdk-rust
          path: sdk/rust/
          retention-days: 30
      
      - name: Create PR with SDK updates
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(sdk): regenerate SDKs from OpenAPI spec"
          title: "chore(sdk): Regenerate SDKs"
          body: |
            This PR was automatically generated because the Enterprise API changed.
            
            ## Changes
            - Regenerated Python SDK
            - Regenerated TypeScript SDK
            - Regenerated Go SDK
            - Regenerated Rust SDK
            
            ## Verification
            - [ ] Review generated code for correctness
            - [ ] Test SDK functionality
          branch: chore/regenerate-sdks
          base: main
          labels: sdk, automated

  validate-sdks:
    name: Validate Generated SDKs
    runs-on: ubuntu-latest
    needs: generate-sdks
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Python SDK
        uses: actions/download-artifact@v4
        with:
          name: sdk-python
          path: sdk/python/
      
      - name: Download TypeScript SDK
        uses: actions/download-artifact@v4
        with:
          name: sdk-typescript
          path: sdk/typescript/
      
      - name: Download Go SDK
        uses: actions/download-artifact@v4
        with:
          name: sdk-go
          path: sdk/go/
      
      - name: Download Rust SDK
        uses: actions/download-artifact@v4
        with:
          name: sdk-rust
          path: sdk/rust/
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Validate Python SDK
        run: |
          uv sync --project sdk/python
          uv run --project sdk/python python -c "from encypher.client import EncypherClient; print('Python SDK OK')"
      
      - name: Validate TypeScript SDK
        run: |
          cd sdk/typescript
          npm install
          npx tsc --noEmit || echo "TypeScript validation complete"
      
      - name: Validate Go SDK
        run: |
          cd sdk/go
          go mod tidy
          go build ./...
          echo "Go SDK OK"
      
      - name: Validate Rust SDK
        run: |
          cd sdk/rust
          cargo check
          echo "Rust SDK OK"
