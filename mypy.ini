[mypy]
# Global settings
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
show_error_codes = True
show_column_numbers = True
files = enterprise_api/app
exclude = ^(archive|apps|audit_log_cli|c2pa-text|dashboard_app|encypher-ai|examples|integrations|packages|policy_validator_cli|scripts|sdk|services|shared_commercial_libs|tools)([\\/]|$)|.*[\\/](tests|__pycache__|alembic|migrations)[\\/]|enterprise_api[\\/]app[\\/](models|crud)[\\/]
plugins = pydantic.mypy

# Strictness (start lenient, increase over time)
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False
no_implicit_optional = True
strict_equality = True

# Import handling
ignore_missing_imports = True
follow_imports = silent

# Error output
pretty = True
color_output = True

# Per-module overrides for stricter checking on core modules
[mypy-app.services.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

[mypy-app.models.*]
ignore_errors = True
follow_imports = skip

[mypy-app.crud.*]
ignore_errors = True
follow_imports = skip

[mypy-services.auth-service.app.services.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-services.key-service.app.services.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True

# Ignore test files (less strict)
[mypy-tests.*]
disallow_untyped_defs = False
ignore_errors = True

# Ignore migration files
[mypy-alembic.*]
ignore_errors = True

# Third-party libraries without stubs
[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-encypher.*]
ignore_missing_imports = True

[mypy-prometheus_client.*]
ignore_missing_imports = True

[mypy-structlog.*]
ignore_missing_imports = True
