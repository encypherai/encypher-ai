# PostgreSQL Performance Tuning for High-Throughput Writes
# 
# This configuration optimizes PostgreSQL for write-heavy workloads like
# the embeddings benchmark. Apply these settings to postgresql.conf.
#
# IMPORTANT: These settings prioritize performance over durability.
# For production, use more conservative settings or enable synchronous_commit.
#
# Location of postgresql.conf:
# - Windows: C:\Program Files\PostgreSQL\<version>\data\postgresql.conf
# - Linux: /etc/postgresql/<version>/main/postgresql.conf
# - Docker: Mount as volume or use ALTER SYSTEM commands
#
# After changing, restart PostgreSQL:
# - Windows: Restart "PostgreSQL" service
# - Linux: sudo systemctl restart postgresql
# - Docker: docker restart <container>

# ============================================================================
# WRITE PERFORMANCE OPTIMIZATION
# ============================================================================

# Asynchronous commit - Don't wait for WAL write to disk
# This is safe for benchmarks and acceptable for many production workloads
# where a small amount of data loss (< 1 second) is acceptable
synchronous_commit = off
# Options: on (safest, slowest), off (fastest), local, remote_write, remote_apply
# Performance impact: 2-5x faster writes

# WAL (Write-Ahead Log) settings
wal_buffers = 16MB
# Default is usually 16MB, increase if you have lots of concurrent writes
# Rule of thumb: 3% of shared_buffers, up to 16MB

# Checkpoint settings - Reduce checkpoint frequency
checkpoint_timeout = 15min
# Default: 5min. Longer intervals = fewer checkpoints = better write performance
# Trade-off: Longer recovery time after crash

max_wal_size = 4GB
# Default: 1GB. Allows more WAL files before checkpoint
# Reduces checkpoint frequency for write-heavy workloads

checkpoint_completion_target = 0.9
# Default: 0.5. Spread checkpoint I/O over more of the checkpoint interval
# Reduces I/O spikes

# ============================================================================
# MEMORY SETTINGS
# ============================================================================

# Shared buffers - PostgreSQL's main cache
shared_buffers = 4GB
# Rule of thumb: 25% of RAM for dedicated database server
# For 63GB RAM system: 4-16GB is reasonable
# Adjust based on your workload

# Effective cache size - Hint to query planner
effective_cache_size = 16GB
# Rule of thumb: 50-75% of RAM
# This doesn't allocate memory, just tells planner how much OS will cache

# Work memory - Per-operation sort/hash memory
work_mem = 64MB
# Default: 4MB. Increase for complex queries with sorts/hashes
# Be careful: This is per operation, not per connection!
# With 150 connections: 150 * 64MB = 9.6GB potential usage

# Maintenance work memory - For VACUUM, CREATE INDEX, etc.
maintenance_work_mem = 1GB
# Default: 64MB. Increase for faster index creation and maintenance

# ============================================================================
# CONNECTION SETTINGS
# ============================================================================

max_connections = 200
# Default: 100. Increase to match your connection pool (150) + overhead
# Each connection uses ~10MB of RAM

# ============================================================================
# QUERY PLANNER SETTINGS
# ============================================================================

# Random page cost - Adjust for SSD vs HDD
random_page_cost = 1.1
# Default: 4.0 (for HDD). Use 1.1-1.5 for SSD
# Lower values favor index scans over sequential scans

effective_io_concurrency = 200
# Default: 1. For SSD, use 200. For HDD, use 2-4
# Tells PostgreSQL how many concurrent I/O operations the storage can handle

# ============================================================================
# LOGGING (Optional - for debugging)
# ============================================================================

# Uncomment these to log slow queries
# log_min_duration_statement = 1000  # Log queries taking > 1 second
# log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
# log_checkpoints = on
# log_connections = on
# log_disconnections = on
# log_duration = off
# log_lock_waits = on

# ============================================================================
# AUTOVACUUM (Important for write-heavy workloads)
# ============================================================================

autovacuum = on
# Keep this ON! Autovacuum prevents table bloat

autovacuum_max_workers = 4
# Default: 3. Increase for write-heavy workloads

autovacuum_naptime = 30s
# Default: 1min. How often to check for tables needing vacuum
# Shorter intervals = more responsive to write-heavy tables

# ============================================================================
# APPLYING THESE SETTINGS
# ============================================================================

# Method 1: Edit postgresql.conf directly
# 1. Find postgresql.conf (see locations above)
# 2. Copy these settings to the file
# 3. Restart PostgreSQL

# Method 2: Use ALTER SYSTEM (PostgreSQL 9.4+)
# Run these SQL commands as superuser:
#
# ALTER SYSTEM SET synchronous_commit = off;
# ALTER SYSTEM SET wal_buffers = '16MB';
# ALTER SYSTEM SET checkpoint_timeout = '15min';
# ALTER SYSTEM SET max_wal_size = '4GB';
# ALTER SYSTEM SET shared_buffers = '4GB';
# ALTER SYSTEM SET effective_cache_size = '16GB';
# ALTER SYSTEM SET work_mem = '64MB';
# ALTER SYSTEM SET maintenance_work_mem = '1GB';
# ALTER SYSTEM SET max_connections = 200;
# ALTER SYSTEM SET random_page_cost = 1.1;
# ALTER SYSTEM SET effective_io_concurrency = 200;
# SELECT pg_reload_conf();  -- Reload without restart (some settings need restart)

# Method 3: Docker environment variables
# Add to docker-compose.yml or docker run:
#
# environment:
#   POSTGRES_INITDB_ARGS: "-c synchronous_commit=off -c wal_buffers=16MB"
# command:
#   - "postgres"
#   - "-c"
#   - "synchronous_commit=off"
#   - "-c"
#   - "shared_buffers=4GB"
#   - "-c"
#   - "max_connections=200"

# ============================================================================
# VERIFICATION
# ============================================================================

# After applying, verify settings with:
# SHOW synchronous_commit;
# SHOW shared_buffers;
# SHOW max_connections;
# 
# Or see all settings:
# SELECT name, setting, unit FROM pg_settings WHERE name IN (
#   'synchronous_commit', 'wal_buffers', 'checkpoint_timeout',
#   'shared_buffers', 'max_connections', 'random_page_cost'
# );
