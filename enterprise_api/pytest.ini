[pytest]
# Pytest configuration for Enterprise API tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Test paths
testpaths = tests

# Markers
markers =
    asyncio: mark test as async
    unit: mark test as unit test
    integration: mark test as integration test
    performance: mark test as performance test
    slow: mark test as slow running
    real_db: mark test that requires a real database connection

# Coverage options (if using pytest-cov)
[coverage:run]
source = app
omit = 
    */tests/*
    */migrations/*
    */alembic/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
