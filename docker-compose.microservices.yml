# Docker Compose for Encypher Microservices
# Database-per-Service Architecture
#
# Usage:
#   docker-compose -f docker-compose.microservices.yml up -d
#
# Each service has its own database and manages its own schema via Alembic

version: '3.8'

services:
  # ============================================
  # POSTGRES INSTANCES (Database-per-Service)
  # ============================================
  
  # Auth Service Database
  postgres-auth:
    image: postgres:15-alpine
    container_name: encypher-postgres-auth
    environment:
      POSTGRES_DB: encypher_auth
      POSTGRES_USER: encypher
      POSTGRES_PASSWORD: encypher_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encypher -d encypher_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Key Service Database (Organizations, API Keys)
  postgres-keys:
    image: postgres:15-alpine
    container_name: encypher-postgres-keys
    environment:
      POSTGRES_DB: encypher_keys
      POSTGRES_USER: encypher
      POSTGRES_PASSWORD: encypher_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_keys_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encypher -d encypher_keys"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Billing Service Database
  postgres-billing:
    image: postgres:15-alpine
    container_name: encypher-postgres-billing
    environment:
      POSTGRES_DB: encypher_billing
      POSTGRES_USER: encypher
      POSTGRES_PASSWORD: encypher_dev_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_billing_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encypher -d encypher_billing"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Encoding Service Database
  postgres-encoding:
    image: postgres:15-alpine
    container_name: encypher-postgres-encoding
    environment:
      POSTGRES_DB: encypher_encoding
      POSTGRES_USER: encypher
      POSTGRES_PASSWORD: encypher_dev_password
    ports:
      - "5435:5432"
    volumes:
      - postgres_encoding_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encypher -d encypher_encoding"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Verification Service Database
  postgres-verification:
    image: postgres:15-alpine
    container_name: encypher-postgres-verification
    environment:
      POSTGRES_DB: encypher_verification
      POSTGRES_USER: encypher
      POSTGRES_PASSWORD: encypher_dev_password
    ports:
      - "5436:5432"
    volumes:
      - postgres_verification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encypher -d encypher_verification"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Analytics Service Database
  postgres-analytics:
    image: postgres:15-alpine
    container_name: encypher-postgres-analytics
    environment:
      POSTGRES_DB: encypher_analytics
      POSTGRES_USER: encypher
      POSTGRES_PASSWORD: encypher_dev_password
    ports:
      - "5437:5432"
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encypher -d encypher_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Coalition Service Database
  postgres-coalition:
    image: postgres:15-alpine
    container_name: encypher-postgres-coalition
    environment:
      POSTGRES_DB: encypher_coalition
      POSTGRES_USER: encypher
      POSTGRES_PASSWORD: encypher_dev_password
    ports:
      - "5438:5432"
    volumes:
      - postgres_coalition_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encypher -d encypher_coalition"]
      interval: 10s
      timeout: 5s
      retries: 5

  # User Service Database
  postgres-users:
    image: postgres:15-alpine
    container_name: encypher-postgres-users
    environment:
      POSTGRES_DB: encypher_users
      POSTGRES_USER: encypher
      POSTGRES_PASSWORD: encypher_dev_password
    ports:
      - "5439:5432"
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encypher -d encypher_users"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Notification Service Database
  postgres-notifications:
    image: postgres:15-alpine
    container_name: encypher-postgres-notifications
    environment:
      POSTGRES_DB: encypher_notifications
      POSTGRES_USER: encypher
      POSTGRES_PASSWORD: encypher_dev_password
    ports:
      - "5440:5432"
    volumes:
      - postgres_notifications_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encypher -d encypher_notifications"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # REDIS (Shared Cache & Message Broker)
  # ============================================
  
  redis:
    image: redis:7-alpine
    container_name: encypher-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================
  # MICROSERVICES
  # ============================================

  # Auth Service (Port 8001)
  auth-service:
    build: ./services/auth-service
    container_name: encypher-auth-service
    ports:
      - "8001:8001"
    environment:
      # Service-specific database
      DATABASE_URL: postgresql://encypher:encypher_dev_password@postgres-auth:5432/encypher_auth
      # Shared services
      REDIS_URL: redis://redis:6379
      # Service config
      SERVICE_NAME: auth-service
      SERVICE_PORT: 8001
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      # CORS
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      # URLs
      MARKETING_SITE_URL: http://localhost:3000
      DASHBOARD_URL: http://localhost:3001
      # JWT
      JWT_SECRET_KEY: dev_jwt_secret_key_change_in_production_min_32_chars
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Key Service (Port 8003)
  key-service:
    build: ./services/key-service
    container_name: encypher-key-service
    ports:
      - "8003:8003"
    environment:
      # Service-specific database
      DATABASE_URL: postgresql://encypher:encypher_dev_password@postgres-keys:5432/encypher_keys
      # Shared services
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8001
      # Service config
      SERVICE_NAME: key-service
      SERVICE_PORT: 8003
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      # CORS
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      postgres-keys:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Billing Service (Port 8007)
  billing-service:
    build: ./services/billing-service
    container_name: encypher-billing-service
    ports:
      - "8007:8007"
    environment:
      # Service-specific database
      DATABASE_URL: postgresql://encypher:encypher_dev_password@postgres-billing:5432/encypher_billing
      # Shared services
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8001
      KEY_SERVICE_URL: http://key-service:8003
      # Service config
      SERVICE_NAME: billing-service
      SERVICE_PORT: 8007
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      # CORS
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      postgres-billing:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Encoding Service (Port 8004)
  encoding-service:
    build: ./services/encoding-service
    container_name: encypher-encoding-service
    ports:
      - "8004:8004"
    environment:
      # Service-specific database
      DATABASE_URL: postgresql://encypher:encypher_dev_password@postgres-encoding:5432/encypher_encoding
      # Shared services
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8001
      KEY_SERVICE_URL: http://key-service:8003
      # Service config
      SERVICE_NAME: encoding-service
      SERVICE_PORT: 8004
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      # CORS
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      postgres-encoding:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Verification Service (Port 8005)
  verification-service:
    build:
      context: .
      dockerfile: ./services/verification-service/Dockerfile
    container_name: encypher-verification-service
    ports:
      - "8005:8005"
    environment:
      # Service-specific database
      DATABASE_URL: postgresql://encypher:encypher_dev_password@postgres-verification:5432/encypher_verification
      # Shared services
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8001
      KEY_SERVICE_URL: http://key-service:8003
      ENCODING_SERVICE_URL: http://encoding-service:8004
      # Service config
      SERVICE_NAME: verification-service
      SERVICE_PORT: 8005
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      # CORS
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      postgres-verification:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Analytics Service (Port 8006)
  analytics-service:
    build: ./services/analytics-service
    container_name: encypher-analytics-service
    ports:
      - "8006:8006"
    environment:
      # Service-specific database
      DATABASE_URL: postgresql://encypher:encypher_dev_password@postgres-analytics:5432/encypher_analytics
      # Shared services
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8001
      # Service config
      SERVICE_NAME: analytics-service
      SERVICE_PORT: 8006
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      # CORS
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      postgres-analytics:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Coalition Service (Port 8009)
  coalition-service:
    build: ./services/coalition-service
    container_name: encypher-coalition-service
    ports:
      - "8009:8009"
    environment:
      # Service-specific database
      DATABASE_URL: postgresql://encypher:encypher_dev_password@postgres-coalition:5432/encypher_coalition
      # Shared services
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8001
      KEY_SERVICE_URL: http://key-service:8003
      # Service config
      SERVICE_NAME: coalition-service
      SERVICE_PORT: 8009
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      # CORS
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      postgres-coalition:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # User Service (Port 8002)
  user-service:
    build: ./services/user-service
    container_name: encypher-user-service
    ports:
      - "8002:8002"
    environment:
      # Service-specific database
      DATABASE_URL: postgresql://encypher:encypher_dev_password@postgres-users:5432/encypher_users
      # Shared services
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8001
      # Service config
      SERVICE_NAME: user-service
      SERVICE_PORT: 8002
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      # CORS
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      postgres-users:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Notification Service (Port 8008)
  notification-service:
    build: ./services/notification-service
    container_name: encypher-notification-service
    ports:
      - "8008:8008"
    environment:
      # Service-specific database
      DATABASE_URL: postgresql://encypher:encypher_dev_password@postgres-notifications:5432/encypher_notifications
      # Shared services
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8001
      # Service config
      SERVICE_NAME: notification-service
      SERVICE_PORT: 8008
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      # CORS
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      postgres-notifications:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==============================================
  # ENTERPRISE API (Port 9000)
  # ==============================================
  # C2PA signing/verification, Merkle trees, embeddings
  enterprise-api:
    build:
      context: .
      dockerfile: enterprise_api/Dockerfile
    container_name: encypher-enterprise-api
    ports:
      - "9000:9000"
    environment:
      # Database (uses same postgres-auth for now, can be split later)
      DATABASE_URL: postgresql://encypher:encypher_dev_password@postgres-auth:5432/encypher_auth
      CORE_DATABASE_URL: postgresql://encypher:encypher_dev_password@postgres-auth:5432/encypher_auth
      CONTENT_DATABASE_URL: postgresql://encypher:encypher_dev_password@postgres-auth:5432/encypher_auth
      # Redis
      REDIS_URL: redis://redis:6379/0
      # Service URLs
      AUTH_SERVICE_URL: http://auth-service:8001
      KEY_SERVICE_URL: http://key-service:8003
      COALITION_SERVICE_URL: http://coalition-service:8009
      # Encryption keys (dev only - generate new for production!)
      KEY_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      ENCRYPTION_NONCE: "0123456789abcdef01234567"
      # Environment
      ENVIRONMENT: development
      PORT: 9000
      # Demo API key for testing
      DEMO_API_KEY: "demo_test_key_12345"
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==============================================
  # TRAEFIK (API Gateway / Reverse Proxy)
  # ==============================================
  # Traefik handles all routing, TLS termination, and load balancing
  # Routes requests to appropriate microservices based on path
  traefik:
    image: traefik:v2.10
    container_name: encypher-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik:/etc/traefik
      - ./certs:/etc/traefik/certs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_auth_data:
  postgres_keys_data:
  postgres_billing_data:
  postgres_encoding_data:
  postgres_verification_data:
  postgres_analytics_data:
  postgres_coalition_data:
  postgres_users_data:
  postgres_notifications_data:
  redis_data:
