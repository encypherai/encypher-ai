version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app # Mount the app directory for hot-reloading
    env_file:
      - ../.env.example # Or point to a specific .env.development if you create one
    # depends_on:
      # - db # If you add a database service
    networks:
      - encypherai_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src # Mount src for hot-reloading
      - ./frontend/public:/app/public
    # depends_on:
      # - backend # Not strictly necessary for dev if frontend handles API errors gracefully
    networks:
      - encypherai_network

networks:
  encypherai_network:
    driver: bridge

# volumes:
  # postgres_data: # Example if you add a database
