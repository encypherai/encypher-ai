global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'encypher-local'
    environment: 'development'

# Scrape configurations for local docker-compose
# NOTE: Most microservices don't have /metrics endpoints yet.
# Only scrape services that have metrics enabled.
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Health checks only (no /metrics endpoint yet)
  # TODO: Enable metrics scraping when services implement /metrics
  # - job_name: 'auth-service'
  #   static_configs:
  #     - targets: ['auth-service:8001']
  #   metrics_path: '/metrics'
  #   scrape_interval: 15s

# Alerting rules
rule_files:
  - 'alerts.yml'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']
