# Traefik Route Configuration for Local Development
# Maps API paths to appropriate microservices

http:
  routers:
    # ============================================
    # VERIFY PORTAL (Host-based) -> Verification Service (8005)
    # Supports public URLs like https://verify.encypherai.com/{document_id}
    # ============================================
    verify-portal-router:
      rule: "Host(`verify.encypherai.com`)"
      service: verification-service
      entryPoints:
        - web
      priority: 20

    # Custom verification domains (catch-all for local dev testing)
    verify-portal-custom-router:
      rule: "HostRegexp(`{subdomain:[a-z0-9-]+}.localhost`)"
      service: verification-service
      entryPoints:
        - web
      priority: 5

    # ============================================
    # API KEY MANAGEMENT -> Key Service (8003)
    # ============================================
    keys-router:
      rule: "PathPrefix(`/api/v1/keys`)"
      service: key-service
      entryPoints:
        - web
      middlewares:
        - cors-api

    # ============================================
    # AUTHENTICATION -> Auth Service (8001)
    # ============================================
    auth-router:
      rule: "PathPrefix(`/api/v1/auth`)"
      service: auth-service
      entryPoints:
        - web
      priority: 10
      middlewares:
        - cors-api

    # ============================================
    # ORGANIZATIONS -> Auth Service (8001)
    # Team management, invitations, audit logs
    # ============================================
    organizations-router:
      rule: "PathPrefix(`/api/v1/organizations`)"
      service: auth-service
      entryPoints:
        - web
      priority: 10
      middlewares:
        - cors-api

    # ============================================
    # USER MANAGEMENT -> User Service (8002)
    # ============================================
    users-router:
      rule: "PathPrefix(`/api/v1/users`)"
      service: user-service
      entryPoints:
        - web
      middlewares:
        - cors-api

    # ============================================
    # ANALYTICS -> Analytics Service (8006)
    # ============================================
    analytics-router:
      rule: "PathPrefix(`/api/v1/analytics`)"
      service: analytics-service
      entryPoints:
        - web
      priority: 10
      middlewares:
        - cors-api

    # ============================================
    # BILLING -> Billing Service (8007)
    # ============================================
    billing-router:
      rule: "PathPrefix(`/api/v1/billing`)"
      service: billing-service
      entryPoints:
        - web
      middlewares:
        - cors-api

    billing-webhooks-router:
      rule: "PathPrefix(`/api/v1/webhooks`)"
      service: billing-service
      entryPoints:
        - web
      middlewares:
        - cors-api

    # ============================================
    # ENCODING -> Encoding Service (8004)
    # ============================================
    encoding-router:
      rule: "PathPrefix(`/api/v1/encode`)"
      service: encoding-service
      entryPoints:
        - web
      middlewares:
        - cors-api

    # ============================================
    # IMAGE VERIFICATION -> Enterprise API (9000)
    # /api/v1/verify/image uses XMP+DB lookup in enterprise-api
    # Must be higher priority than verify-router (100)
    # ============================================
    verify-image-router:
      rule: "PathPrefix(`/api/v1/verify/image`)"
      service: enterprise-api
      entryPoints:
        - web
      priority: 110
      middlewares:
        - cors-api

    # ============================================
    # VERIFICATION -> Verification Service (8005)
    # All /api/v1/verify/* endpoints handled by verification-service
    # (including /verify/advanced which proxies to enterprise-api internally)
    # ============================================
    verify-router:
      rule: "PathPrefix(`/api/v1/verify`)"
      service: verification-service
      entryPoints:
        - web
      priority: 100
      middlewares:
        - cors-api

    coalition-router:
      rule: "PathPrefix(`/api/v1/coalition`)"
      service: coalition-service
      entryPoints:
        - web
      middlewares:
        - cors-api

    # ============================================
    # NOTIFICATIONS -> Notification Service (8008)
    # ============================================
    notifications-router:
      rule: "PathPrefix(`/api/v1/notifications`)"
      service: notification-service
      entryPoints:
        - web
      middlewares:
        - cors-api

    # ============================================
    # WEB SERVICE -> Marketing forms + marketing analytics (8002)
    # ============================================
    web-service-router:
      rule: "PathPrefix(`/api/v1/ai-demo`) || PathPrefix(`/api/v1/publisher-demo`) || PathPrefix(`/api/v1/sales`) || PathPrefix(`/api/v1/demo-requests`) || PathPrefix(`/api/v1/marketing-analytics`)"
      service: web-service
      entryPoints:
        - web
      middlewares:
        - cors-api

    # ============================================
    # C2PA SIGNING/VERIFICATION -> Enterprise API (9000)
    # Catch-all for /api/v1/* routes not matched above
    # ============================================
    enterprise-router:
      rule: "PathPrefix(`/api/v1`)"
      service: enterprise-api
      entryPoints:
        - web
      priority: 1  # Lower priority, matches last
      middlewares:
        - cors-api

    # ============================================
    # HEALTH CHECK (Traefik itself)
    # ============================================
    health-router:
      rule: "Path(`/health`)"
      service: enterprise-api
      entryPoints:
        - web

    # ============================================
    # API DOCUMENTATION -> Enterprise API (9000)
    # Serves OpenAPI docs at /docs and /redoc
    # Also serves OpenAPI JSON at /openapi.json
    # ============================================
    docs-router:
      rule: "Path(`/docs`) || Path(`/redoc`) || Path(`/openapi.json`)"
      service: enterprise-api
      entryPoints:
        - web
      priority: 10  # Higher priority than catch-all
      middlewares:
        - cors-api

    # ============================================
    # ROOT LANDING -> Enterprise API (9000)
    # Serves API info/welcome page at /
    # ============================================
    root-router:
      rule: "Path(`/`)"
      service: enterprise-api
      entryPoints:
        - web
      priority: 10
      middlewares:
        - cors-api

  middlewares:
    cors-api:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
          - "PATCH"
        accessControlAllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "X-Request-ID"
          - "X-API-Key"
        accessControlAllowOriginList:
          - "http://localhost:3000"
          - "http://localhost:3001"
        accessControlAllowCredentials: true
        accessControlMaxAge: 86400
        addVaryHeader: true

  services:
    auth-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8001"

    user-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8002"

    key-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8003"

    encoding-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8004"

    verification-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8005"

    coalition-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8009"

    analytics-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8006"

    billing-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8007"

    notification-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8008"

    web-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8002"

    enterprise-api:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:9000"
