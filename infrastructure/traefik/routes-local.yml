# Traefik Route Configuration for Local Development
# Maps API paths to appropriate microservices

http:
  routers:
    # ============================================
    # VERIFY PORTAL (Host-based) -> Enterprise API (9000)
    # Supports public URLs like https://verify.encypherai.com/{document_id}
    # ============================================
    verify-portal-router:
      rule: "Host(`verify.encypherai.com`)"
      service: enterprise-api
      entryPoints:
        - web
      priority: 20

    # ============================================
    # API KEY MANAGEMENT -> Key Service (8003)
    # ============================================
    keys-router:
      rule: "PathPrefix(`/api/v1/keys`)"
      service: key-service
      entryPoints:
        - web

    # ============================================
    # AUTHENTICATION -> Auth Service (8001)
    # ============================================
    auth-router:
      rule: "PathPrefix(`/api/v1/auth`)"
      service: auth-service
      entryPoints:
        - web

    # ============================================
    # ORGANIZATIONS -> Auth Service (8001)
    # Team management, invitations, audit logs
    # ============================================
    organizations-router:
      rule: "PathPrefix(`/api/v1/organizations`)"
      service: auth-service
      entryPoints:
        - web

    # ============================================
    # USER MANAGEMENT -> User Service (8002)
    # ============================================
    users-router:
      rule: "PathPrefix(`/api/v1/users`)"
      service: user-service
      entryPoints:
        - web

    # ============================================
    # ANALYTICS -> Analytics Service (8006)
    # ============================================
    analytics-router:
      rule: "PathPrefix(`/api/v1/analytics`)"
      service: analytics-service
      entryPoints:
        - web

    # ============================================
    # BILLING -> Billing Service (8007)
    # ============================================
    billing-router:
      rule: "PathPrefix(`/api/v1/billing`)"
      service: billing-service
      entryPoints:
        - web

    # ============================================
    # ENCODING -> Encoding Service (8004)
    # ============================================
    encoding-router:
      rule: "PathPrefix(`/api/v1/encode`)"
      service: encoding-service
      entryPoints:
        - web

    # ============================================
    # VERIFICATION -> Enterprise API (9000)
    # All /verify endpoints handled by enterprise-api
    # ============================================
    verify-router:
      rule: "PathPrefix(`/api/v1/verify`)"
      service: enterprise-api
      entryPoints:
        - web

    # ============================================
    # NOTIFICATIONS -> Notification Service (8008)
    # ============================================
    notifications-router:
      rule: "PathPrefix(`/api/v1/notifications`)"
      service: notification-service
      entryPoints:
        - web

    # ============================================
    # C2PA SIGNING/VERIFICATION -> Enterprise API (9000)
    # Catch-all for /api/v1/* routes not matched above
    # ============================================
    enterprise-router:
      rule: "PathPrefix(`/api/v1`)"
      service: enterprise-api
      entryPoints:
        - web
      priority: 1  # Lower priority, matches last

    # ============================================
    # HEALTH CHECK (Traefik itself)
    # ============================================
    health-router:
      rule: "Path(`/health`)"
      service: enterprise-api
      entryPoints:
        - web

    # ============================================
    # API DOCUMENTATION -> Enterprise API (9000)
    # Serves OpenAPI docs at /docs and /redoc
    # Also serves OpenAPI JSON at /openapi.json
    # ============================================
    docs-router:
      rule: "Path(`/docs`) || Path(`/redoc`) || Path(`/openapi.json`)"
      service: enterprise-api
      entryPoints:
        - web
      priority: 10  # Higher priority than catch-all

    # ============================================
    # ROOT LANDING -> Enterprise API (9000)
    # Serves API info/welcome page at /
    # ============================================
    root-router:
      rule: "Path(`/`)"
      service: enterprise-api
      entryPoints:
        - web
      priority: 10

  services:
    auth-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8001"

    user-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8002"

    key-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8003"

    encoding-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8004"

    verification-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8005"

    analytics-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8006"

    billing-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8007"

    notification-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8008"

    enterprise-api:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:9000"
