name: Sign Content

"on":
  push:
    branches:
      - main
      - master
    paths:
      - 'articles/**'
      - 'posts/**'
      - 'content/**'
      - 'docs/**'
  workflow_dispatch: {}

jobs:
  sign:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git metadata
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Install Encypher SDK
        run: |
          uv pip install --system encypher-enterprise
      
      - name: Sign content
        env:
          ENCYPHER_API_KEY: ${{ secrets.ENCYPHER_API_KEY }}
        run: |
          encypher sign-repo ./articles \
            --author "${{ github.actor }}" \
            --publisher "${{ github.repository_owner }}" \
            --license "CC-BY-4.0" \
            --incremental \
            --use-git-metadata \
            --use-frontmatter \
            --report signing-report.json \
            --report-format html
      
      - name: Upload signing report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signing-report
          path: signing-report.json
      
      - name: Commit signed files
        run: |
          git config user.name "Encypher Bot"
          git config user.email "bot@encypherai.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Sign content [skip ci]"
          git push
