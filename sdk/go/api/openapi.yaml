  /api/v1/public/verify/{ref_id}:
    get:
      description: "Verify a minimal signed embedding and retrieve associated metadata.\n\
        \    \n    **This endpoint is PUBLIC and does NOT require authentication.**\n\
        \    \n    Third parties can use this endpoint to:\n    - Verify authenticity\
        \ of content with embedded markers\n    - Retrieve document metadata (title,\
        \ author, organization)\n    - Access C2PA manifest information\n    - View\
        \ licensing terms\n    - Get Merkle proof for cryptographic verification\n\
        \    \n    **Rate Limiting:**\n    - 1000 requests/hour per IP address\n \
        \   - CAPTCHA required after repeated failures\n    \n    **Privacy:**\n \
        \   - Only returns text preview (first 200 characters)\n    - Full text content\
        \ is NOT exposed\n    - Internal document IDs are mapped to public IDs\n \
        \   \n    **Example Usage:**\n    ```\n    GET /api/v1/public/verify/a3f9c2e1?signature=8k3mP9xQ\n\
        \    ```"
      operationId: verify_embedding_api_v1_public_verify__ref_id__get
      parameters:
      - explode: false
        in: path
        name: ref_id
        required: true
        schema:
          title: Ref Id
          type: string
        style: simple
      - description: HMAC signature (8+ hex characters)
        explode: true
        in: query
        name: signature
        required: true
        schema:
          description: HMAC signature (8+ hex characters)
          title: Signature
          type: string
        style: form
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyEmbeddingResponse"
          description: Embedding verified successfully
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/app__schemas__embeddings__ErrorResponse"
          description: Invalid request
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/app__schemas__embeddings__ErrorResponse"
          description: Embedding not found
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/app__schemas__embeddings__ErrorResponse"
          description: Rate limit exceeded
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Verify Embedding (Public - No Auth Required)
      tags:
      - Public - Verification
  /api/v1/public/verify/batch:
    post:
      description: "Verify multiple embeddings in a single request.\n    \n    **This\
        \ endpoint is PUBLIC and does NOT require authentication.**\n    \n    Useful\
        \ for:\n    - Verifying all embeddings on a page at once\n    - Bulk verification\
        \ by web scrapers\n    - Browser extensions checking multiple paragraphs\n\
        \    \n    **Rate Limiting:**\n    - 100 requests/hour per IP address\n  \
        \  - Maximum 50 embeddings per request"
      operationId: batch_verify_embeddings_api_v1_public_verify_batch_post
      parameters:
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/app__schemas__embeddings__BatchVerifyRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchVerifyResponse"
          description: Batch verification completed
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/app__schemas__embeddings__ErrorResponse"
          description: Invalid request
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/app__schemas__embeddings__ErrorResponse"
          description: Rate limit exceeded
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Batch Verify Embeddings (Public - No Auth Required)
      tags:
      - Public - Verification
  /api/v1/public/extract-and-verify:
    post:
      description: "Extract and verify invisible Unicode embedding from text using\
        \ encypher-ai.\n    \n    **This endpoint is PUBLIC and does NOT require authentication.**\n\
        \    \n    This is the NEW verification method for invisible embeddings:\n\
        \    - Extracts invisible Unicode variation selector embeddings\n    - Verifies\
        \ cryptographic signature using encypher-ai\n    - Returns enterprise metadata\
        \ (Merkle tree, document info, etc.)\n    \n    **How it works:**\n    1.\
        \ Text contains invisible Unicode variation selectors\n    2. encypher-ai\
        \ extracts and verifies the embedded metadata\n    3. Enterprise API looks\
        \ up Merkle tree and document info\n    4. Returns full verification result\
        \ with all metadata\n    \n    **Rate Limiting:**\n    - 1000 requests/hour\
        \ per IP address\n    \n    **Example Usage:**\n    ```json\n    POST /api/v1/public/extract-and-verify\n\
        \    {\n      \"text\": \"Content with invisible embedding...\"\n    }\n \
        \   ```"
      operationId: extract_and_verify_embedding_api_v1_public_extract_and_verify_post
      parameters:
      - explode: false
        in: header
        name: authorization
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractAndVerifyRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractAndVerifyResponse"
          description: Embedding extracted and verified
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/app__schemas__embeddings__ErrorResponse"
          description: Invalid request
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/app__schemas__embeddings__ErrorResponse"
          description: No embedding found
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/app__schemas__embeddings__ErrorResponse"
          description: Rate limit exceeded
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Extract and Verify Invisible Embedding (Public - No Auth Required)
      tags:
      - Public - Verification
components:
  schemas:
    APIKeyCreateRequest:
      description: Request schema for creating an API key.
      example:
        expires_in_days: 30
        name: name
        scopes:
        - scopes
        - scopes
      properties:
        name:
          maxLength: 255
          nullable: true
          type: string
        expires_in_days:
          maximum: 365.0
          minimum: 1.0
          nullable: true
          type: integer
        scopes:
          items:
            type: string
          nullable: true
          type: array
      title: APIKeyCreateRequest
    APIKeyListResponse:
      description: Response schema for listing API keys.
      example:
        total: 0
        keys:
        - key: ""
        - key: ""
      properties:
        keys:
          description: List of API keys
          items:
            additionalProperties: {}
          type: array
        total:
          description: Total number of keys
          title: Total
          type: integer
      required:
      - keys
      - total
      title: APIKeyListResponse
    APIKeyResponse:
      description: Response schema for API key.
      example:
        expires_at: 2000-01-23T04:56:07.000+00:00
        tier: tier
        api_key: api_key
        key_id: key_id
        organization_id: organization_id
        created_at: 2000-01-23T04:56:07.000+00:00
      properties:
        api_key:
          description: Generated API key
          title: Api Key
          type: string
        key_id:
          description: API key identifier
          title: Key Id
          type: string
        organization_id:
          description: Organization identifier
          title: Organization Id
          type: string
        tier:
          description: Organization tier
          title: Tier
          type: string
        created_at:
          description: Creation timestamp
          format: date-time
          title: Created At
          type: string
        expires_at:
          format: date-time
          nullable: true
          type: string
      required:
      - api_key
      - created_at
      - key_id
      - organization_id
      - tier
      title: APIKeyResponse
    APIKeyRevokeRequest:
      description: Request schema for revoking an API key.
      example:
        reason: reason
        key_id: key_id
      properties:
        key_id:
          description: API key identifier to revoke
          title: Key Id
          type: string
        reason:
          nullable: true
