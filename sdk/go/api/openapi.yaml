          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevocationResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Revoke Document
      tags:
      - Status & Revocation
      - Status & Revocation
