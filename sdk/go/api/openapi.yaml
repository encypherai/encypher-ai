        explode: false
        in: path
        name: signer_id
        required: true
        schema:
          description: Signer identifier from manifest
          title: Signer Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustAnchorResponse"
          description: Successful Response
        "404":
          description: Signer not found
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Lookup trust anchor for C2PA verification (Public)
      tags:
      - Public - C2PA
