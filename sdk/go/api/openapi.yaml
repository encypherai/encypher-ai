openapi: 3.1.0
info:
  description: "C2PA-compliant content signing and verification infrastructure for\
    \ publishers, legal/finance firms, AI labs, and enterprises"
  title: Encypher Enterprise API
  version: 1.0.2
servers:
- description: Production
  url: https://api.encypherai.com
- description: Local development
  url: http://localhost:8007
paths:
  /health:
    get:
      description: |-
        Health check endpoint for monitoring.

        Returns:
            dict: Status and environment information
      operationId: health_check_health_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Health Check
      tags:
      - Health
  /readyz:
    get:
      description: Lightweight readiness probe.
      operationId: readiness_check_readyz_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Readiness Check
      tags:
      - Health
  /:
    get:
      description: |-
        API root endpoint with basic information.

        Returns:
            dict: API information
      operationId: root__get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Root
      tags:
      - Info
  /api/v1/account:
    get:
      description: |-
        Get current organization account information.

        Returns organization details including:
        - Organization ID and name
        - Current subscription tier
        - Enabled feature flags
        - Account creation date
      operationId: get_account_info_api_v1_account_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get Account Info
      tags:
      - Account
      - Account
  /api/v1/account/quota:
    get:
      description: |-
        Get detailed quota information for the organization.

        Returns current usage and limits for:
        - C2PA signatures
        - Sentences tracked
        - Batch operations
        - API calls
      operationId: get_account_quota_api_v1_account_quota_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotaResponse"
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get Account Quota
      tags:
      - Account
      - Account
  /api/v1/byok/public-keys:
    get:
      description: List all registered public keys for the organization.
      operationId: list_public_keys_api_v1_byok_public_keys_get
      parameters:
      - description: Include revoked keys
        explode: true
        in: query
        name: include_revoked
        required: false
        schema:
          default: false
          description: Include revoked keys
          title: Include Revoked
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicKeyListResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List public keys
      tags:
      - BYOK
      - BYOK
    post:
      description: Register a BYOK public key for signature verification.
      operationId: register_public_key_api_v1_byok_public_keys_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicKeyRegisterRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicKeyRegisterResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Register a public key
      tags:
      - BYOK
      - BYOK
  /api/v1/byok/public-keys/{key_id}:
    delete:
      description: Revoke a registered public key. Revoked keys cannot be used for
        verification.
      operationId: revoke_public_key_api_v1_byok_public_keys__key_id__delete
      parameters:
      - explode: false
        in: path
        name: key_id
        required: true
        schema:
          title: Key Id
          type: string
        style: simple
      - description: Reason for revocation
        explode: true
        in: query
        name: reason
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: {}
                title: Response Revoke Public Key Api V1 Byok Public Keys  Key Id  Delete
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Revoke a public key
      tags:
      - BYOK
      - BYOK
  /api/v1/byok/trusted-cas:
    get:
      description: Returns the list of C2PA-trusted CAs that can issue signing certificates.
      operationId: list_trusted_cas_api_v1_byok_trusted_cas_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustListResponse"
          description: Successful Response
      summary: List trusted Certificate Authorities
      tags:
      - BYOK
      - BYOK
  /api/v1/byok/certificates:
    post:
      description: Upload an X.509 certificate signed by a C2PA-trusted CA for BYOK
        signing.
      operationId: upload_certificate_api_v1_byok_certificates_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CertificateUploadRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateUploadResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Upload a CA-signed certificate
      tags:
      - BYOK
      - BYOK
  /api/v1/documents:
    get:
      description: |-
        List signed documents for the organization.

        Supports pagination, search, and filtering by status and date range.
      operationId: list_documents_api_v1_documents_get
      parameters:
      - description: Page number
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          description: Page number
          minimum: 1
          title: Page
          type: integer
        style: form
      - description: Items per page
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          default: 50
          description: Items per page
          maximum: 100
          minimum: 1
          title: Page Size
          type: integer
        style: form
      - description: Search in title
        explode: true
        in: query
        name: search
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Filter by status (active/revoked)
        explode: true
        in: query
        name: status
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Filter from date (ISO format)
        explode: true
        in: query
        name: from_date
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Filter to date (ISO format)
        explode: true
        in: query
        name: to_date
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Documents
      tags:
      - Documents
      - Documents
  /api/v1/documents/{document_id}:
    delete:
      description: |-
        Soft delete a document.

        By default, this also revokes the document so it will fail verification.
        The document is not permanently deleted but marked as deleted.
      operationId: delete_document_api_v1_documents__document_id__delete
      parameters:
      - explode: false
        in: path
        name: document_id
        required: true
        schema:
          title: Document Id
          type: string
        style: simple
      - description: Also revoke the document
        explode: true
        in: query
        name: revoke
        required: false
        schema:
          default: true
          description: Also revoke the document
          title: Revoke
          type: boolean
        style: form
      - description: Reason for deletion
        explode: true
        in: query
        name: reason
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDeleteResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete Document
      tags:
      - Documents
      - Documents
    get:
      description: Get detailed information about a specific document.
      operationId: get_document_api_v1_documents__document_id__get
      parameters:
      - explode: false
        in: path
        name: document_id
        required: true
        schema:
          title: Document Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetailResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Document
      tags:
      - Documents
      - Documents
  /api/v1/documents/{document_id}/history:
    get:
      description: |-
        Get the audit trail/history for a document.

        Shows all actions taken on the document including signing, verification, and revocation.
      operationId: get_document_history_api_v1_documents__document_id__history_get
      parameters:
      - explode: false
        in: path
        name: document_id
        required: true
        schema:
          title: Document Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentHistoryResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Document History
      tags:
      - Documents
      - Documents
  /api/v1/keys:
    get:
      description: |-
        List API keys for the organization.

        Keys are masked - only the prefix is shown for security.
      operationId: list_keys_api_v1_keys_get
      parameters:
      - description: Include revoked keys
        explode: true
        in: query
        name: include_revoked
        required: false
        schema:
          default: false
          description: Include revoked keys
          title: Include Revoked
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyListResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Keys
      tags:
      - API Keys
      - API Keys
    post:
      description: |-
        Create a new API key.

        The full key is only returned once - store it securely.
      operationId: create_key_api_v1_keys_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyCreateRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyCreateResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create Key
      tags:
      - API Keys
      - API Keys
  /api/v1/keys/{key_id}:
    delete:
      description: |-
        Revoke an API key.

        The key will immediately stop working. This action cannot be undone.
      operationId: revoke_key_api_v1_keys__key_id__delete
      parameters:
      - explode: false
        in: path
        name: key_id
        required: true
        schema:
          title: Key Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyRevokeResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Revoke Key
      tags:
      - API Keys
      - API Keys
    patch:
      description: Update an API key's name or permissions.
      operationId: update_key_api_v1_keys__key_id__patch
      parameters:
      - explode: false
        in: path
        name: key_id
        required: true
        schema:
          title: Key Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyUpdateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyUpdateResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Update Key
      tags:
      - API Keys
      - API Keys
  /api/v1/keys/{key_id}/rotate:
    post:
      description: |-
        Rotate an API key.

        Creates a new key with the same permissions and revokes the old one.
        The new key is only returned once - store it securely.
      operationId: rotate_key_api_v1_keys__key_id__rotate_post
      parameters:
      - explode: false
        in: path
        name: key_id
        required: true
        schema:
          title: Key Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyRotateResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Rotate Key
      tags:
      - API Keys
      - API Keys
  /api/v1/webhooks:
    get:
      description: List all webhooks for the organization.
      operationId: list_webhooks_api_v1_webhooks_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListResponse"
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: List Webhooks
      tags:
      - Webhooks
      - Webhooks
    post:
      description: |-
        Register a new webhook.

        The webhook URL must be HTTPS. You can optionally provide a shared secret
        for HMAC signature verification of webhook payloads.
      operationId: create_webhook_api_v1_webhooks_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookCreateRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookCreateResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create Webhook
      tags:
      - Webhooks
      - Webhooks
  /api/v1/webhooks/{webhook_id}:
    delete:
      description: Delete a webhook.
      operationId: delete_webhook_api_v1_webhooks__webhook_id__delete
      parameters:
      - explode: false
        in: path
        name: webhook_id
        required: true
        schema:
          title: Webhook Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDeleteResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete Webhook
      tags:
      - Webhooks
      - Webhooks
    get:
      description: Get details of a specific webhook.
      operationId: get_webhook_api_v1_webhooks__webhook_id__get
      parameters:
      - explode: false
        in: path
        name: webhook_id
        required: true
        schema:
          title: Webhook Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Webhook
      tags:
      - Webhooks
      - Webhooks
    patch:
      description: "Update a webhook's URL, events, or active status."
      operationId: update_webhook_api_v1_webhooks__webhook_id__patch
      parameters:
      - explode: false
        in: path
        name: webhook_id
        required: true
        schema:
          title: Webhook Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookUpdateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookUpdateResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Update Webhook
      tags:
      - Webhooks
      - Webhooks
  /api/v1/webhooks/{webhook_id}/test:
    post:
      description: |-
        Send a test event to the webhook.

        This sends a test payload to verify the webhook is configured correctly.
      operationId: test_webhook_api_v1_webhooks__webhook_id__test_post
      parameters:
      - explode: false
        in: path
        name: webhook_id
        required: true
        schema:
          title: Webhook Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTestResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Test Webhook
      tags:
      - Webhooks
      - Webhooks
  /api/v1/webhooks/{webhook_id}/deliveries:
    get:
      description: Get delivery history for a webhook.
      operationId: get_webhook_deliveries_api_v1_webhooks__webhook_id__deliveries_get
      parameters:
      - explode: false
        in: path
        name: webhook_id
        required: true
        schema:
          title: Webhook Id
          type: string
        style: simple
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          title: Page
          type: integer
        style: form
      - explode: true
        in: query
        name: page_size
        required: false
        schema:
          default: 50
          maximum: 100
          minimum: 1
          title: Page Size
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDeliveriesResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Webhook Deliveries
      tags:
      - Webhooks
      - Webhooks
  /api/v1/sign:
    post:
      description: Sign content with a C2PA manifest.
      operationId: sign_content_api_v1_sign_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Sign Content
      tags:
      - Signing
  /api/v1/sign/advanced:
    post:
      description: |-
        Sign a document while enabling advanced embedding controls (e.g., manifest options and distribution strategies).

        Tier requirements are enforced server-side (typically Professional+ depending on selected options).
      operationId: sign_advanced_api_v1_sign_advanced_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EncodeWithEmbeddingsRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncodeWithEmbeddingsResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Sign with advanced embedding controls
      tags:
      - Signing
  /api/v1/verify/advanced:
    post:
      description: Verify signed content and optionally run attribution/plagiarism
        analysis.
      operationId: verify_advanced_api_v1_verify_advanced_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyAdvancedRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Advanced verification
      tags:
      - Verification
  /api/v1/lookup:
    post:
      description: |-
        Look up sentence provenance by hash.

        This endpoint allows anyone to paste a sentence and find which document
        it originally came from, along with metadata about the publisher.

        Use case: User pastes a sentence, we find which document it came from.

        Note: This endpoint does NOT require authentication (public lookup).

        **Alias:** POST /provenance/lookup
      operationId: lookup_sentence_api_v1_lookup_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LookupRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LookupResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Lookup Sentence
      tags:
      - Lookup
  /api/v1/provenance/lookup:
    post:
      description: |-
        Look up sentence provenance by hash.

        This is an alias for POST /lookup with a clearer name.
        Find which document a sentence originally came from.

        Note: This endpoint does NOT require authentication (public lookup).
      operationId: provenance_lookup_api_v1_provenance_lookup_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LookupRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LookupResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Provenance Lookup
      tags:
      - Lookup
  /api/v1/onboarding/request-certificate:
    post:
      description: |-
        Initiate SSL.com certificate request for organization.

