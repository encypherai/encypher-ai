  /api/v1/enterprise/merkle/encode:
    post:
      description: "Encode a document into Merkle trees at specified segmentation\
        \ levels.\n    \n    This endpoint:\n    1. Segments the document text at\
        \ multiple levels (word/sentence/paragraph/section)\n    2. Builds Merkle\
        \ trees for each segmentation level\n    3. Stores all tree data in the database\
        \ for future attribution queries\n    4. Returns root hashes and tree metadata\n\
        \    \n    **Enterprise Tier Only** - Requires valid organization with Merkle\
        \ features enabled.\n    \n    **Rate Limits:**\n    - Free tier: Not available\n\
        \    - Enterprise tier: 1000 documents/month\n    \n    **Processing Time:**\n\
        \    - Small documents (<1000 words): ~100-200ms\n    - Medium documents (1000-10000\
        \ words): ~500ms-2s\n    - Large documents (>10000 words): ~2-10s"
      operationId: encode_document_api_v1_enterprise_merkle_encode_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentEncodeRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentEncodeResponse"
          description: Document encoded successfully
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/app__schemas__merkle__ErrorResponse"
          description: Invalid request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/app__schemas__merkle__ErrorResponse"
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/app__schemas__merkle__ErrorResponse"
          description: Quota exceeded or feature not enabled
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/app__schemas__merkle__ErrorResponse"
          description: Server error
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Encode Document into Merkle Trees
      tags:
      - Enterprise - Merkle Trees
