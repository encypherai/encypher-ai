  /api/v1/public/c2pa/trust-anchors/{signer_id}:
    get:
      description: |-
        Lookup a trust anchor (public key) for external C2PA validators.

        This endpoint enables third-party validators to verify Encypher-signed
        content by providing the signer's public key. This implements the
        "Private Credential Store" model per C2PA spec §14.4.3.

        **Special signer IDs:**
        - `encypher.public` or `org_demo`: Returns Encypher's official demo/free-tier key
        - `demo-*`: Returns demo/test keys (non-production)

        **C2PA Spec Reference:**
        https://spec.c2pa.org/specifications/specifications/2.2/specs/C2PA_Specification.html#_trust_lists
      operationId: get_trust_anchor_api_v1_public_c2pa_trust_anchors__signer_id__get
      parameters:
      - description: Signer identifier from manifest
        explode: false
        in: path
        name: signer_id
        required: true
        schema:
          description: Signer identifier from manifest
          title: Signer Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustAnchorResponse"
          description: Successful Response
        "404":
          description: Signer not found
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Lookup trust anchor for C2PA verification (Public)
      tags:
      - Public - C2PA
components:
  schemas:
    KeyUpdateResponse:
      description: Response after updating a key.
      example:
        data:
          key: ""
        success: true
      properties:
        success:
          default: true
          title: Success
          type: boolean
        data:
          additionalProperties: {}
          title: Data
      required:
      - data
      title: KeyUpdateResponse
    DocumentListResponse:
      description: Response for document listing.
      example:
        data:
          key: ""
        success: true
      properties:
        success:
          default: true
          title: Success
          type: boolean
        data:
          additionalProperties: {}
          description: Documents and pagination info
          title: Data
      required:
      - data
      title: DocumentListResponse
    KeyRevokeResponse:
      description: Response after revoking a key.
      example:
        data:
          key: ""
        success: true
      properties:
        success:
          default: true
          title: Success
          type: boolean
        data:
          additionalProperties: {}
          title: Data
      required:
      - data
      title: KeyRevokeResponse
    BatchSignRequest:
      description: Batch signing request.
      example:
        mode: c2pa
        segmentation_level: document
        fail_fast: false
        idempotency_key: idempotency_key
        items:
        - metadata:
            key: ""
          text: text
          document_id: document_id
          title: title
        - metadata:
            key: ""
          text: text
          document_id: document_id
          title: title
        - metadata:
            key: ""
          text: text
          document_id: document_id
          title: title
        - metadata:
            key: ""
          text: text
          document_id: document_id
          title: title
        - metadata:
            key: ""
          text: text
          document_id: document_id
          title: title
      properties:
        mode:
          description: "Processing mode: 'c2pa' or 'embeddings'"
          enum:
          - c2pa
          - embeddings
          title: Mode
          type: string
        segmentation_level:
          enum:
          - document
          - paragraph
          - sentence
          nullable: true
          type: string
        idempotency_key:
          description: Caller-supplied key used to deduplicate retries
          maxLength: 128
          minLength: 8
          title: Idempotency Key
          type: string
        items:
          description: Documents to process (max 100)
          items:
            $ref: "#/components/schemas/BatchItemPayload"
          maxItems: 100
          minItems: 1
          type: array
        fail_fast:
          default: false
          description: Abort remaining items upon the first error when set to true
          title: Fail Fast
          type: boolean
      required:
      - idempotency_key
      - items
      - mode
      title: BatchSignRequest
    C2PAAssertionValidateResponse:
      description: Response schema for assertion validation.
      example:
        valid: true
        assertions:
        - valid: true
          warnings:
          - warnings
          - warnings
          label: label
          errors:
          - errors
          - errors
        - valid: true
          warnings:
          - warnings
          - warnings
          label: label
          errors:
          - errors
          - errors
      properties:
        valid:
          title: Valid
          type: boolean
        assertions:
          items:
            $ref: "#/components/schemas/C2PAAssertionValidationResult"
          type: array
      required:
      - assertions
      - valid
      title: C2PAAssertionValidateResponse
    C2PAAssertionValidationResult:
      description: Validation result for a single assertion.
      example:
        valid: true
        warnings:
        - warnings
        - warnings
        label: label
        errors:
        - errors
        - errors
      properties:
        label:
          title: Label
          type: string
        valid:
          title: Valid
          type: boolean
