  /api/v1/status/documents/{document_id}/revoke:
    post:
      description: |-
        Revoke a document's authenticity.

        The document will fail verification within 5 minutes (CDN cache TTL).
        This action is reversible via the reinstate endpoint.

        **Revocation Reasons:**
        - `factual_error`: Content contains factual errors
        - `legal_takedown`: Legal request (DMCA, court order)
        - `copyright_claim`: Copyright infringement claim
        - `privacy_request`: Privacy/GDPR request
        - `publisher_request`: Publisher-initiated takedown
        - `security_concern`: Security vulnerability in content
        - `content_policy`: Violates content policy
        - `other`: Other reason (specify in reason_detail)
      operationId: revoke_document_api_v1_status_documents__document_id__revoke_post
      parameters:
      - explode: false
        in: path
        name: document_id
        required: true
        schema:
          title: Document Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevocationResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Revoke Document
      tags:
      - Status & Revocation
      - Status & Revocation
