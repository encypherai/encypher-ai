    post:
      description: "Automatically provision an organization, user account, and API\
        \ key.\n    \n    This endpoint is designed for external services to automatically\
        \ create\n    accounts without manual intervention:\n    \n    **Use Cases:**\n\
        \    - SDK initialization (auto-create account on first use)\n    - WordPress\
        \ plugin activation (auto-provision on install)\n    - CLI tool setup (auto-create\
        \ account on login)\n    - Mobile app onboarding (auto-provision on signup)\n\
        \    \n    **What Gets Created:**\n    1. Organization (with specified tier)\n\
        \    2. User account (associated with email)\n    3. API key (for authentication)\n\
        \    \n    **Idempotent:** If organization already exists for email, returns\
        \ existing\n    organization with a new API key.\n    \n    **Rate Limits:**\n\
        \    - 10 requests per minute per IP\n    - 100 requests per hour per email\n\
        \    \n    **Security:**\n    - Requires valid provisioning token (for production)\n\
        \    - Validates email format\n    - Logs all provisioning events"
      operationId: auto_provision_api_v1_provisioning_auto_provision_post
      parameters:
      - description: Provisioning token (optional)
        explode: false
        in: header
        name: x-provisioning-token
        required: false
        schema:
          description: Provisioning token (optional)
          title: X-Provisioning-Token
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoProvisionRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoProvisionResponse"
          description: Organization and API key created successfully
        "400":
          description: Invalid request
        "429":
          description: Rate limit exceeded
        "500":
          description: Server error
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Auto-provision Organization and API Key
      tags:
      - Provisioning
