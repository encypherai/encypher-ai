openapi: 3.1.0
info:
  description: "C2PA-compliant content signing and verification infrastructure for\
    \ publishers, legal/finance firms, AI labs, and enterprises"
  title: Encypher Enterprise API
  version: 1.0.0-preview
servers:
- url: /
paths:
  /health:
    get:
      description: |-
        Health check endpoint for monitoring.

        Returns:
            dict: Status and environment information
      operationId: health_check_health_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Health Check
      tags:
      - Health
  /readyz:
    get:
      description: Lightweight readiness probe.
      operationId: readiness_check_readyz_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Readiness Check
      tags:
      - Health
  /:
    get:
      description: |-
        API root endpoint with basic information.

        Returns:
            dict: API information
      operationId: root__get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Root
      tags:
      - Info
  /api/v1/sign:
    post:
      description: Sign content with a C2PA manifest.
      operationId: sign_content_api_v1_sign_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Sign Content
      tags:
      - Signing
  /api/v1/verify/{document_id}:
    get:
      description: |-
        Verify a document by its ID (for clickable verification links).

        Returns an HTML page so users can preview verification state in a browser.
      operationId: verify_by_document_id_api_v1_verify__document_id__get
      parameters:
      - explode: false
        in: path
        name: document_id
        required: true
        schema:
          title: Document Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Verify By Document Id
      tags:
      - Verification
  /api/v1/verify:
    post:
      description: |-
        Verify C2PA manifest in signed content using the encypher-ai library.

        This endpoint is public, rate limited, and returns structured machine-friendly
        verdicts that SDKs consume.
      operationId: verify_content_api_v1_verify_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Verify Content
      tags:
      - Verification
  /api/v1/lookup:
    post:
      description: |-
        Look up sentence provenance by hash.

        This endpoint allows anyone to paste a sentence and find which document
        it originally came from, along with metadata about the publisher.

        Use case: User pastes a sentence, we find which document it came from.

        Note: This endpoint does NOT require authentication (public lookup).

        Args:
            request: LookupRequest containing sentence text
            db: Database session

        Returns:
            LookupResponse with document and organization details if found
      operationId: lookup_sentence_api_v1_lookup_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LookupRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LookupResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Lookup Sentence
      tags:
      - Lookup
  /api/v1/onboarding/request-certificate:
    post:
      description: |-
        Initiate SSL.com certificate request for organization.

        This endpoint:
        1. Checks if organization already has a pending/active certificate
        2. Creates SSL.com order via API
        3. Stores order tracking in certificate_lifecycle table
        4. Returns validation URL to organization

        Args:
            organization: Organization details from authentication
            db: Database session

        Returns:
            dict: Certificate request details including validation URL

        Raises:
            HTTPException: If organization already has certificate or SSL.com API fails
      operationId: request_certificate_api_v1_onboarding_request_certificate_post
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Request Certificate
      tags:
      - Onboarding
  /api/v1/onboarding/certificate-status:
    get:
      description: |-
        Get current certificate status for organization.

        Args:
            organization: Organization details from authentication
            db: Database session

        Returns:
            dict: Current certificate status
      operationId: get_certificate_status_api_v1_onboarding_certificate_status_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get Certificate Status
      tags:
      - Onboarding
  /api/v1/stream/sign:
    post:
      description: Stream signing progress via SSE.
      operationId: stream_signing_api_v1_stream_sign_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamSignRequest"
        required: true
      responses:
        "200":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Stream Signing
      tags:
      - Streaming
  /api/v1/stream/session/create:
    post:
      description: "Create a new streaming session.\n\nArgs:\n    session_type: Type\
        \ of session (websocket, sse, kafka)\n    metadata: Optional session metadata\n\
        \    signing_options: Optional signing configuration\n    organization: Authenticated\
        \ organization\n    db: Database session\n    \nReturns:\n    Session creation\
        \ result with session_id"
      operationId: create_streaming_session_api_v1_stream_session_create_post
      parameters:
      - explode: true
        in: query
        name: session_type
        required: false
        schema:
          default: websocket
          title: Session Type
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Body_create_streaming_session_api_v1_stream_session_create_post"
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create Streaming Session
      tags:
      - Streaming
  /api/v1/stream/session/{session_id}/close:
    post:
      description: "Close a streaming session.\n\nArgs:\n    session_id: Session identifier\n\
        \    organization: Authenticated organization\n    db: Database session\n\
        \    \nReturns:\n    Session closure result with stats"
      operationId: close_streaming_session_api_v1_stream_session__session_id__close_post
      parameters:
      - explode: false
        in: path
        name: session_id
        required: true
        schema:
          title: Session Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Close Streaming Session
      tags:
      - Streaming
  /api/v1/stream/events:
    get:
      description: "Server-Sent Events (SSE) endpoint for unidirectional streaming.\n\
        \nArgs:\n    session_id: Session identifier\n    api_key: API key for authentication\n\
        \    \nReturns:\n    StreamingResponse with SSE events"
      operationId: sse_events_endpoint_api_v1_stream_events_get
      parameters:
      - explode: true
        in: query
        name: session_id
        required: true
        schema:
          title: Session Id
          type: string
        style: form
      - explode: true
        in: query
        name: api_key
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Sse Events Endpoint
      tags:
      - Streaming
  /api/v1/stream/stats:
    get:
      description: "Get streaming statistics for organization.\n\nArgs:\n    organization:\
        \ Authenticated organization\n    \nReturns:\n    Streaming statistics"
      operationId: get_streaming_stats_api_v1_stream_stats_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get Streaming Stats
      tags:
      - Streaming
  /api/v1/stream/health:
    get:
      description: |-
        Health check endpoint for streaming service.

        Returns:
            Health status of streaming components
      operationId: streaming_health_check_api_v1_stream_health_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Streaming Health Check
      tags:
      - Streaming
  /api/v1/stream/runs/{run_id}:
    get:
      description: Return persisted streaming run state.
      operationId: get_stream_run_api_v1_stream_runs__run_id__get
      parameters:
      - explode: false
        in: path
        name: run_id
        required: true
        schema:
          title: Run Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Stream Run
      tags:
      - Streaming
  /api/v1/stream/chat/openai-compatible:
    post:
      description: "OpenAI-compatible chat completion endpoint with signing.\n\nThis\
        \ endpoint mimics the OpenAI Chat Completions API but adds\nC2PA signing to\
        \ the response content.\n\nArgs:\n    request: Chat completion request\n \
        \   organization: Authenticated organization\n    db: Database session\n \
        \   \nReturns:\n    Chat completion response (streaming or non-streaming)"
      operationId: openai_compatible_chat_api_v1_stream_chat_openai_compatible_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Openai Compatible Chat
      tags:
      - Chat
  /api/v1/stream/chat/health:
    get:
      description: |-
        Health check for chat streaming endpoint.

        Returns:
            Health status
      operationId: chat_health_check_api_v1_stream_chat_health_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Chat Health Check
      tags:
      - Chat
  /api/v1/licensing/agreements:
    get:
      description: |-
        List all licensing agreements.

        **Admin only** - Returns all agreements with optional filtering.
      operationId: list_agreements_api_v1_licensing_agreements_get
      parameters:
      - description: Filter by status
        explode: true
        in: query
        name: status
        required: false
        schema:
          $ref: "#/components/schemas/AgreementStatus"
        style: form
      - description: Results per page
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          description: Results per page
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
        style: form
      - description: Pagination offset
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          description: Pagination offset
          minimum: 0
          title: Offset
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/LicensingAgreementResponse"
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Agreements
      tags:
      - Licensing
      - Licensing
    post:
      description: |-
        Create a new licensing agreement with an AI company.

        **Admin only** - Creates agreement and generates API key for AI company.

        Returns:
            Agreement details including the API key (only shown once)
      operationId: create_agreement_api_v1_licensing_agreements_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicensingAgreementCreate"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicensingAgreementCreateResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Agreement
      tags:
      - Licensing
      - Licensing
  /api/v1/licensing/agreements/{agreement_id}:
    delete:
      description: |-
        Terminate a licensing agreement.

        **Admin only** - Sets agreement status to terminated.
      operationId: terminate_agreement_api_v1_licensing_agreements__agreement_id__delete
      parameters:
      - explode: false
        in: path
        name: agreement_id
        required: true
        schema:
          format: uuid
          title: Agreement Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Terminate Agreement
      tags:
      - Licensing
      - Licensing
    get:
      description: |-
        Get details of a specific licensing agreement.

        **Admin only**
      operationId: get_agreement_api_v1_licensing_agreements__agreement_id__get
      parameters:
      - explode: false
        in: path
        name: agreement_id
        required: true
        schema:
          format: uuid
          title: Agreement Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicensingAgreementResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Agreement
      tags:
      - Licensing
      - Licensing
    patch:
      description: |-
        Update a licensing agreement.

        **Admin only** - Allows updating agreement terms and status.
      operationId: update_agreement_api_v1_licensing_agreements__agreement_id__patch
      parameters:
      - explode: false
        in: path
        name: agreement_id
        required: true
        schema:
          format: uuid
          title: Agreement Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicensingAgreementUpdate"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicensingAgreementResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Update Agreement
      tags:
      - Licensing
      - Licensing
  /api/v1/licensing/content:
    get:
      description: |-
        List available content for licensed AI company.

        **Requires AI company API key** - Returns content metadata that matches
        the terms of active licensing agreements.

        Headers:
            Authorization: Bearer lic_abc123...
      operationId: list_available_content_api_v1_licensing_content_get
      parameters:
      - description: Filter by content type
        explode: true
        in: query
        name: content_type
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Minimum word count
        explode: true
        in: query
        name: min_word_count
        required: false
        schema:
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Results per page
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          description: Results per page
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
        style: form
      - description: Pagination offset
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          description: Pagination offset
          minimum: 0
          title: Offset
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentListResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Available Content
      tags:
      - Licensing
      - Licensing
  /api/v1/licensing/track-access:
    post:
      description: |-
        Track content access by AI company.

        **Requires AI company API key** - Logs when content is accessed for
        revenue attribution.

        Headers:
            Authorization: Bearer lic_abc123...
      operationId: track_content_access_api_v1_licensing_track_access_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentAccessTrack"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentAccessLogResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Track Content Access
      tags:
      - Licensing
      - Licensing
  /api/v1/licensing/distributions:
    get:
      description: |-
        List revenue distributions.

        **Admin only** - Returns all distributions with optional filtering.
      operationId: list_distributions_api_v1_licensing_distributions_get
      parameters:
      - description: Filter by agreement
        explode: true
        in: query
        name: agreement_id
        required: false
        schema:
          format: uuid
          nullable: true
          type: string
        style: form
      - description: Filter by status
        explode: true
        in: query
        name: status
        required: false
        schema:
          $ref: "#/components/schemas/DistributionStatus"
        style: form
      - description: Results per page
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          description: Results per page
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
        style: form
      - description: Pagination offset
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          description: Pagination offset
          minimum: 0
          title: Offset
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/RevenueDistributionResponse"
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Distributions
      tags:
      - Licensing
      - Licensing
    post:
      description: |-
        Create revenue distribution for a period.

        **Admin only** - Calculates and creates revenue distribution based on
        content access during the specified period. Implements 70/30 split.
      operationId: create_revenue_distribution_api_v1_licensing_distributions_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevenueDistributionCreate"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueDistributionResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Revenue Distribution
      tags:
      - Licensing
      - Licensing
  /api/v1/licensing/distributions/{distribution_id}:
    get:
      description: |-
        Get details of a revenue distribution.

        **Admin only** - Includes breakdown of member revenues.
      operationId: get_distribution_api_v1_licensing_distributions__distribution_id__get
      parameters:
      - explode: false
        in: path
        name: distribution_id
        required: true
        schema:
          format: uuid
          title: Distribution Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueDistributionResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Distribution
      tags:
      - Licensing
      - Licensing
  /api/v1/licensing/payouts:
    post:
      description: |-
        Process payouts for a revenue distribution.

        **Admin only** - Initiates payment processing for all members in a distribution.

        Note: This is currently a simulation. In production, this would integrate
        with Stripe or other payment processors.
      operationId: process_payouts_api_v1_licensing_payouts_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayoutCreate"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Process Payouts
      tags:
      - Licensing
      - Licensing
  /api/v1/usage:
    get:
      description: |-
        Get current period usage statistics for the organization.

        Returns usage metrics including:
        - C2PA signatures (documents signed)
        - Sentences tracked
        - Batch operations
        - API calls
      operationId: get_usage_stats_api_v1_usage_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get Usage Stats
      tags:
      - Usage
  /api/v1/usage/reset:
    post:
      description: |-
        Reset monthly usage counters.

        This is typically called by a scheduled job at the start of each billing period.
        Requires admin permissions.
      operationId: reset_monthly_usage_api_v1_usage_reset_post
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResetResponse"
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Reset Monthly Usage
      tags:
      - Usage
  /api/v1/usage/history:
    get:
      description: |-
        Get historical usage data for the organization.

        Returns monthly usage summaries for the specified number of months.
      operationId: get_usage_history_api_v1_usage_history_get
      parameters:
      - explode: true
        in: query
        name: months
        required: false
        schema:
          default: 6
          title: Months
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
