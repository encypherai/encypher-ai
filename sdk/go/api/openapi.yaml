components:
  schemas:
    StreamMerkleStartRequest:
      description: |-
        Request to start a streaming Merkle tree construction session.

        Patent Reference: FIG. 5 - Streaming Merkle Tree Construction

        This initiates a session that allows segments to be added incrementally,
        ideal for real-time LLM output signing where content is generated token-by-token.
      example:
        metadata:
          key: ""
        segmentation_level: sentence
        auto_finalize_timeout_seconds: 2181
        buffer_size: 801
        document_id: document_id
      properties:
        document_id:
          description: Unique document identifier
          title: Document Id
          type: string
        segmentation_level:
          default: sentence
          description: "Segmentation level: sentence, paragraph, section"
          title: Segmentation Level
          type: string
        metadata:
          additionalProperties: {}
          nullable: true
        buffer_size:
          default: 100
          description: Maximum number of segments to buffer before forcing a flush
          maximum: 10000.0
          minimum: 1.0
          title: Buffer Size
          type: integer
        auto_finalize_timeout_seconds:
          default: 300
          description: Timeout in seconds after which session auto-finalizes if idle
          maximum: 3600.0
          minimum: 30.0
          title: Auto Finalize Timeout Seconds
          type: integer
      required:
      - document_id
      title: StreamMerkleStartRequest
    StreamMerkleSegmentResponse:
      description: Response after adding a segment to the streaming Merkle tree.
      example:
        segment_index: 0
        segment_hash: segment_hash
        intermediate_root: intermediate_root
        success: true
        session_id: session_id
        message: message
        total_segments: 1
        buffer_count: 6
      properties:
        success:
          description: Whether segment was added successfully
          title: Success
          type: boolean
        session_id:
          description: Session identifier
          title: Session Id
          type: string
        segment_index:
          description: Index of the added segment
          title: Segment Index
          type: integer
        segment_hash:
          description: SHA-256 hash of the segment
          title: Segment Hash
          type: string
        buffer_count:
          description: Current number of segments in buffer
          title: Buffer Count
          type: integer
        total_segments:
          description: Total segments added to session
          title: Total Segments
          type: integer
        intermediate_root:
          nullable: true
          type: string
        message:
          description: Status message
          title: Message
          type: string
      required:
      - buffer_count
      - message
      - segment_hash
      - segment_index
      - session_id
      - success
      - total_segments
      title: StreamMerkleSegmentResponse
