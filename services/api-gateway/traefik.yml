# Traefik Static Configuration for Railway
# This configures Traefik itself

api:
  dashboard: false  # Disable dashboard in production

# Enable ping endpoint for health checks
ping:
  entryPoint: web

entryPoints:
  web:
    address: ":8080"  # Railway expects port 8080

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: false

log:
  level: INFO

accessLog: {}
