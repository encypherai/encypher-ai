<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{ subject }}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    /* Reset */
    body, table, td, p, a, li, blockquote {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    table, td {
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
    }
    img {
      -ms-interpolation-mode: bicubic;
      border: 0;
      height: auto;
      line-height: 100%;
      outline: none;
      text-decoration: none;
    }
    
    /* Base styles */
    body {
      margin: 0 !important;
      padding: 0 !important;
      background-color: #f4f7fa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #1a1a2e;
    }
    
    .email-wrapper {
      width: 100%;
      background-color: #f4f7fa;
      padding: 40px 20px;
    }
    
    .email-container {
      max-width: 520px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }
    
    /* Header */
    .email-header {
      background: linear-gradient(135deg, #1d3557 0%, #457b9d 100%);
      padding: 32px 40px;
      text-align: center;
    }
    
    .brand-logo {
      max-width: 180px;
      height: auto;
    }
    
    /* Content */
    .email-content {
      padding: 40px;
    }
    
    .email-content h1 {
      margin: 0 0 24px 0;
      font-size: 24px;
      font-weight: 600;
      color: #1d3557;
      line-height: 1.3;
    }
    
    .email-content p {
      margin: 0 0 16px 0;
      color: #4a5568;
    }
    
    .email-content ul {
      margin: 0 0 16px 0;
      padding-left: 24px;
      color: #4a5568;
    }
    
    .email-content li {
      margin-bottom: 8px;
    }
    
    /* CTA Button */
    .cta-container {
      text-align: center;
      margin: 32px 0;
    }
    
    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #457b9d 0%, #1d3557 100%);
      color: #ffffff !important;
      text-decoration: none;
      padding: 16px 40px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s ease;
    }
    
    .cta-button:hover {
      transform: translateY(-2px);
    }
    
    /* Secondary link */
    .link-fallback {
      margin-top: 24px;
      padding: 16px;
      background-color: #f8fafc;
      border-radius: 8px;
      font-size: 14px;
      color: #64748b;
      word-break: break-all;
    }
    
    .link-fallback a {
      color: #457b9d;
      text-decoration: none;
    }
    
    /* Divider */
    .divider {
      height: 1px;
      background-color: #e2e8f0;
      margin: 32px 0;
    }
    
    /* Footer */
    .email-footer {
      background-color: #f8fafc;
      padding: 24px 40px;
      text-align: center;
      border-top: 1px solid #e2e8f0;
    }
    
    .footer-text {
      font-size: 13px;
      color: #94a3b8;
      margin: 0 0 8px 0;
    }
    
    .footer-links {
      margin-top: 16px;
    }
    
    .footer-links a {
      color: #64748b;
      text-decoration: none;
      font-size: 13px;
      margin: 0 12px;
    }
    
    .footer-links a:hover {
      color: #457b9d;
    }
    
    /* Responsive */
    @media only screen and (max-width: 600px) {
      .email-wrapper {
        padding: 20px 10px;
      }
      .email-header {
        padding: 24px 20px;
      }
      .email-content {
        padding: 24px 20px;
      }
      .email-footer {
        padding: 20px;
      }
      .cta-button {
        padding: 14px 32px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
      <tr>
        <td align="center">
          <div class="email-container">
            <!-- Header -->
            <div class="email-header">
              <img src="https://encypherai.com/encypher_full_nobg.png" alt="EncypherAI" class="brand-logo">
            </div>
            
            <!-- Content -->
            <div class="email-content">
              {% block content %}{% endblock %}
            </div>
            
            <!-- Footer -->
            <div class="email-footer">
              <p class="footer-text">
                &copy; {{ year }} EncypherAI. All rights reserved.
              </p>
              <p class="footer-text">
                Making AI transparent and trustworthy.
              </p>
              <div class="footer-links">
                <a href="https://encypherai.com">Website</a>
                <a href="https://encypherai.com/docs">Documentation</a>
                <a href="mailto:support@encypherai.com">Support</a>
              </div>
            </div>
          </div>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
