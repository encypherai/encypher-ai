<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Encypher Email Provenance</title>
    <link rel="stylesheet" href="./taskpane.css" />
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div class="mark">E</div>
        <div>
          <h1>Encypher Email Provenance</h1>
          <p id="modeLabel">Loading Outlook mode...</p>
        </div>
      </header>

      <section class="panel">
        <h2>Actions</h2>
        <div class="grid">
          <button id="signBtn" class="btn primary">Sign Email Body</button>
          <button id="verifyBtn" class="btn">Verify Email Body</button>
        </div>
      </section>

      <section class="panel">
        <h2>Settings</h2>
        <label for="apiKeyInput">API Key</label>
        <input id="apiKeyInput" type="password" placeholder="encypher_..." />

        <label for="apiBaseUrlInput">API Base URL</label>
        <input id="apiBaseUrlInput" type="url" placeholder="https://api.encypherai.com" />

        <div class="grid two">
          <button id="saveSettingsBtn" class="btn primary">Save Settings</button>
          <button id="clearSettingsBtn" class="btn">Clear</button>
        </div>
      </section>

      <section class="panel">
        <h2>Provenance</h2>
        <p id="provenanceSummary">No provenance yet.</p>
      </section>

      <section class="panel" id="resultPanel" hidden>
        <h2>Result</h2>
        <pre id="resultOutput"></pre>
      </section>
    </main>

    <script src="../src/provenance-utils.js"></script>
    <script src="../src/storage.js"></script>
    <script src="../src/api-client.js"></script>
    <script src="../src/outlook-adapter.js"></script>
    <script src="../src/app.js"></script>
  </body>
</html>
