<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      :root {
        --encypher-primary: #1b2f50;
        --encypher-secondary: #2a87c4;
        --bg: #f7f9fc;
        --card: #ffffff;
        --text: #142033;
        --border: #d7dfeb;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .app {
        padding: 12px;
        display: grid;
        gap: 12px;
      }
      .header {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .brand-mark {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--encypher-primary), var(--encypher-secondary));
        color: #fff;
        display: grid;
        place-items: center;
        font-weight: 700;
      }
      h1 {
        margin: 0;
        font-size: 16px;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
      }
      label {
        display: block;
        margin: 6px 0 4px;
        font-size: 12px;
      }
      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        font-size: 13px;
      }
      .grid {
        display: grid;
        gap: 8px;
      }
      .grid.two { grid-template-columns: 1fr 1fr; }
      .btn {
        border: 1px solid var(--encypher-primary);
        color: var(--encypher-primary);
        background: #fff;
        border-radius: 8px;
        padding: 8px 10px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn.primary {
        background: var(--encypher-primary);
        color: #fff;
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: wait;
      }
      .muted {
        margin: 0;
        color: #5b6b83;
        font-size: 12px;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
        font-size: 12px;
        margin: 0;
      }
      pre {
        margin: 0;
        max-height: 160px;
        overflow: auto;
        font-size: 12px;
        background: #0f1728;
        color: #dfe8f8;
        padding: 10px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand-mark">E</div>
        <div>
          <h1>Encypher Provenance</h1>
          <p class="muted">Google Docs Add-on</p>
        </div>
      </header>

      <section class="card">
        <h2>Document</h2>
        <p id="docName" class="mono">Loading...</p>
        <p id="selectionInfo" class="muted"></p>
      </section>

      <section class="card">
        <h2>Actions</h2>
        <div class="grid">
          <button id="signSelectionBtn" class="btn primary">Sign Selection</button>
          <button id="signDocumentBtn" class="btn primary">Sign Full Document</button>
          <button id="verifySelectionBtn" class="btn">Verify Selection</button>
          <button id="verifyDocumentBtn" class="btn">Verify Full Document</button>
        </div>
      </section>

      <section class="card">
        <h2>Settings</h2>
        <label for="apiKey">API Key</label>
        <input id="apiKey" type="password" placeholder="encypher_..." />

        <label for="apiBaseUrl">API Base URL</label>
        <input id="apiBaseUrl" type="url" placeholder="https://api.encypherai.com" />

        <div class="grid two">
          <button id="saveSettingsBtn" class="btn primary">Save Settings</button>
          <button id="clearSettingsBtn" class="btn">Clear</button>
        </div>
      </section>

      <section class="card">
        <h2>Provenance</h2>
        <p id="provenanceSummary" class="muted">Loading...</p>
      </section>

      <section class="card" id="resultCard" hidden>
        <h2>Result</h2>
        <pre id="resultOutput"></pre>
      </section>
    </div>

    <script>
      (function () {
        function byId(id) {
          return document.getElementById(id);
        }

        function setBusy(button, busy) {
          if (!button) return;
          button.disabled = !!busy;
        }

        function showResult(payload) {
          byId('resultCard').hidden = false;
          byId('resultOutput').textContent = JSON.stringify(payload, null, 2);
        }

        function withRunner(ok, fail) {
          return google.script.run
            .withSuccessHandler(ok)
            .withFailureHandler(function (err) {
              showResult({ success: false, error: err && err.message ? err.message : String(err) });
              if (fail) fail(err);
            });
        }

        function refreshState() {
          withRunner(function (state) {
            byId('docName').textContent = state.docName || '';
            byId('selectionInfo').textContent = 'Selected characters: ' + state.selectionChars + ' | Minimum to sign: ' + state.minChars;
            byId('apiBaseUrl').value = state.apiBaseUrl || '';
            if (!state.hasApiKey) {
              byId('apiKey').placeholder = 'Set API key';
            } else {
              byId('apiKey').placeholder = 'Saved (enter to replace)';
            }
          }).getAddonState();

          withRunner(function (prov) {
            byId('provenanceSummary').textContent = 'Visible hash: ' + prov.visibleHash + ' | Entries: ' + prov.count;
          }).sidebarGetProvenanceSummary();
        }

        function callAction(buttonId, fnName) {
          var button = byId(buttonId);
          setBusy(button, true);
          withRunner(function (result) {
            setBusy(button, false);
            showResult(result);
            refreshState();
          }, function () {
            setBusy(button, false);
          })[fnName]();
        }

        byId('signSelectionBtn').addEventListener('click', function () {
          callAction('signSelectionBtn', 'sidebarSignSelection');
        });

        byId('signDocumentBtn').addEventListener('click', function () {
          callAction('signDocumentBtn', 'sidebarSignDocument');
        });

        byId('verifySelectionBtn').addEventListener('click', function () {
          callAction('verifySelectionBtn', 'sidebarVerifySelection');
        });

        byId('verifyDocumentBtn').addEventListener('click', function () {
          callAction('verifyDocumentBtn', 'sidebarVerifyDocument');
        });

        byId('saveSettingsBtn').addEventListener('click', function () {
          var button = byId('saveSettingsBtn');
          setBusy(button, true);
          withRunner(function (result) {
            setBusy(button, false);
            showResult(result);
            byId('apiKey').value = '';
            refreshState();
          }, function () {
            setBusy(button, false);
          }).saveAddonSettings({
            apiKey: byId('apiKey').value,
            apiBaseUrl: byId('apiBaseUrl').value,
          });
        });

        byId('clearSettingsBtn').addEventListener('click', function () {
          var button = byId('clearSettingsBtn');
          setBusy(button, true);
          withRunner(function (result) {
            setBusy(button, false);
            showResult(result);
            byId('apiKey').value = '';
            refreshState();
          }, function () {
            setBusy(button, false);
          }).clearAddonSettings();
        });

        refreshState();
      })();
    </script>
  </body>
</html>
