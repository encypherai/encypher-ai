name: Verify Content

"on":
  pull_request:
    paths:
      - '**.signed.md'
      - '**.signed.txt'
      - '**.signed.html'
  schedule:
    - cron: '0 0 * * 0'  # Weekly verification
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Install Encypher SDK
        run: |
          uv pip install --system encypher-enterprise
      
      - name: Verify signed content
        env:
          ENCYPHER_API_KEY: ${{ secrets.ENCYPHER_API_KEY }}
        run: |
          encypher verify-repo . \
            --fail-on-tampered \
            --report verification-report.json \
            --report-format html
      
      - name: Upload verification report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-report
          path: verification-report.json
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('verification-report.json', 'utf8'));
            
            const body = `## Content Verification Report
            
            - **Total Files:** ${report.summary.total_files}
            - **Valid:** ${report.summary.valid} ✅
            - **Tampered:** ${report.summary.tampered} ⚠️
            - **Failed:** ${report.summary.failed} ❌
            
            ${report.summary.tampered > 0 ? '⚠️ **Warning:** Tampered files detected!' : '✅ All content verified successfully!'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
