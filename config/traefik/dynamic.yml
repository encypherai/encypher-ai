# Traefik Dynamic Configuration
# Routes requests to appropriate microservices based on host and path
#
# API Routing (api.encypherai.com):
#   /api/v1/keys/*       -> key-service (8003)
#   /api/v1/analytics/*  -> analytics-service (8006)
#   /api/v1/billing/*    -> billing-service (8007)
#   /api/v1/users/*      -> user-service (8002)
#   /api/v1/encode/*     -> encoding-service (8004)
#   /api/v1/verify/*     -> enterprise-api (9000)
#   /api/v1/coalition/*  -> enterprise-api (9000)
#   /api/v1/notifications/* -> notification-service (8008)
#   /api/v1/auth/*       -> auth-service (8001) [default]

http:
  routers:
    # ===========================================
    # VERIFY PORTAL (Host-based) -> Verification Service
    # Supports public URLs like https://verify.encypherai.com/{document_id}
    # ===========================================
    verify-portal:
      rule: "Host(`verify.encypherai.com`)"
      service: verification-service
      entryPoints:
        - websecure
        - web
      tls: {}
      priority: 200

    # ===========================================
    # FRONTEND APPS
    # ===========================================
    dashboard:
      rule: "Host(`s-dashboard.encypherai.com`) || Host(`localhost`) && PathPrefix(`/dashboard`)"
      service: dashboard-service
      entryPoints:
        - websecure
        - web
      tls: {}

    marketing:
      rule: "Host(`s-www.encypherai.com`) || Host(`localhost`)"
      service: marketing-service
      entryPoints:
        - websecure
        - web
      tls: {}
      priority: 1

    # ===========================================
    # API ROUTING (path-based service selection)
    # ===========================================
    api-keys:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/keys`)"
      service: key-service
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-analytics:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/analytics`)"
      service: analytics-service
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-billing:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/billing`)"
      service: billing-service
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-users:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/users`)"
      service: user-service
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-profile:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/profile`)"
      service: user-service
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-encode:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/encode`)"
      service: encoding-service
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-documents:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/documents`)"
      service: encoding-service
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    # Verification Service - ALL verification endpoints
    # Routes all /api/v1/verify* to verification-service for independent scaling
    api-verify:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/verify`)"
      service: verification-service
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-coalition:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/coalition`)"
      service: coalition-service
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-notifications:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/notifications`)"
      service: notification-service
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    # ===========================================
    # ENTERPRISE API ROUTES (C2PA signing/verification)
    # ===========================================
    api-sign:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/sign`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-verify-public:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/public`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-batch:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/batch`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100


    api-lookup:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/lookup`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-onboarding:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/onboarding`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-streaming:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/stream`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-chat:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/chat`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-licensing:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/licensing`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-usage:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/usage`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-audit:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/audit`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-org:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/org`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-status:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/status`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-tools:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/tools`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-provisioning:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/provisioning`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-enterprise:
      rule: "Host(`api.encypherai.com`) && PathPrefix(`/api/v1/enterprise`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    # Health, docs, and root endpoints -> enterprise-api
    api-health:
      rule: "Host(`api.encypherai.com`) && Path(`/health`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-docs:
      rule: "Host(`api.encypherai.com`) && (Path(`/docs`) || Path(`/redoc`) || Path(`/openapi.json`))"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    api-root:
      rule: "Host(`api.encypherai.com`) && Path(`/`)"
      service: enterprise-api
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 100

    # Default: auth-service handles /api/v1/auth/* and fallback
    api-auth:
      rule: "Host(`api.encypherai.com`)"
      service: auth-service
      entryPoints:
        - websecure
        - web
      middlewares:
        - cors-api
      tls: {}
      priority: 1

  # ===========================================
  # SERVICES (Backend URLs)
  # ===========================================
  services:
    # Frontend Apps
    dashboard-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3001"

    marketing-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3000"

    # Microservices
    auth-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8001"

    user-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8002"

    key-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8003"

    encoding-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8004"

    verification-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8005"

    analytics-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8006"

    billing-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8007"

    notification-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8008"

    coalition-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8009"

    # Enterprise API (C2PA signing/verification)
    enterprise-api:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:9000"

  # ===========================================
  # MIDDLEWARES
  # ===========================================
  middlewares:
    # CORS middleware for API endpoints
    cors-api:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
          - "PATCH"
        accessControlAllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "X-Request-ID"
          - "X-API-Key"
        accessControlAllowOriginList:
          - "https://encypherai.com"
          - "https://www.encypherai.com"
          - "https://dashboard.encypherai.com"
          - "http://localhost:3000"
          - "http://localhost:3001"
          - "http://localhost:3050"
          - "http://localhost:3051"
        accessControlMaxAge: 86400
        accessControlAllowCredentials: true
        addVaryHeader: true

tls:
  certificates:
    - certFile: /etc/traefik/certs/local-cert.pem
      keyFile: /etc/traefik/certs/local-key.pem
