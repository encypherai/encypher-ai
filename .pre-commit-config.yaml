repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
    -   id: trailing-whitespace
        stages: [pre-commit]
    -   id: end-of-file-fixer
        stages: [pre-commit]
    -   id: check-yaml
        exclude: ^mkdocs\.yml$  # Exclude mkdocs.yml due to PyYAML tags
        stages: [pre-commit]
    -   id: check-added-large-files
        stages: [pre-commit]

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
    -   id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        stages: [pre-commit]
    -   id: ruff-format
        stages: [pre-commit]

# Secret detection
-   repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
    -   id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock\.json|\.secrets\.baseline|enterprise_api/tests/test_api_key_auth\.py|enterprise_api/tests/test_org_context_composition\.py
        stages: [pre-commit]

-   repo: local
    hooks:
    # ── Pre-push: Next.js builds (catches SSG errors, type errors, lint errors) ──
    -   id: nextjs-build-dashboard
        name: nextjs-build-dashboard
        entry: bash -lc 'cd apps/dashboard && (rm -rf .next || sudo rm -rf .next) 2>/dev/null; npm run build'
        language: system
        files: ^apps/dashboard/
        pass_filenames: false
        stages: [pre-push]
    -   id: nextjs-build-marketing
        name: nextjs-build-marketing
        entry: bash -lc 'cd apps/marketing-site && (rm -rf .next || sudo rm -rf .next) 2>/dev/null; npm run build'
        language: system
        files: ^apps/marketing-site/
        pass_filenames: false
        stages: [pre-push]
    -   id: nextjs-build-ap-demo
        name: nextjs-build-ap-demo
        entry: bash -lc 'cd apps/ap-demo && (rm -rf .next || sudo rm -rf .next) 2>/dev/null; npm run build'
        language: system
        files: ^apps/ap-demo/
        pass_filenames: false
        stages: [pre-push]
    # ── Pre-push: Python lint + tests ──
    -   id: enterprise-api-ruff-pre-push
        name: enterprise-api-ruff-pre-push
        entry: bash -lc 'cd enterprise_api && uv run ruff check app tests'
        language: system
        pass_filenames: false
        stages: [pre-push]
    -   id: enterprise-api-pytest-pre-push
        name: enterprise-api-pytest-pre-push
        entry: bash -lc 'cd enterprise_api && uv run pytest tests/unit/ -q --tb=short 2>/dev/null || echo "No unit tests found (skipped)"'
        language: system
        files: ^enterprise_api/
        pass_filenames: false
        stages: [pre-push]

default_install_hook_types: [pre-commit, pre-push]
