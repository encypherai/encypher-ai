# Ruff configuration for Encypher Commercial
# https://docs.astral.sh/ruff/configuration/

line-length = 150
exclude = [
    "sdk/**",
    "archive/**",
]

[lint]
# Enable these rule categories
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "S",   # flake8-bandit (security)
    "B",   # flake8-bugbear
    "I",   # isort
    "UP",  # pyupgrade
]

# Ignore these specific rules
ignore = [
    "S101",  # assert - used in tests
    "S104",  # hardcoded-bind-all-interfaces - intentional for Docker
    "S105",  # hardcoded-password - false positives in test fixtures
    "S106",  # hardcoded-password-func-arg - false positives in test fixtures
    "S311",  # random - we use random for non-crypto purposes (IDs, sampling)
    "S605",  # shell-injection - we control the commands
    "S608",  # hardcoded-sql-expression - false positives in Alembic migrations
    "S607",  # partial-executable-path - we control the commands
    "E402",  # module-import-not-at-top - sometimes needed for conditional imports
    "E501",  # line-too-long - handled by line-length setting
    "E701",  # multiple-statements - sometimes used for compact code
    "E712",  # true-false-comparison - SQLAlchemy requires == True/False for SQL generation
    "E722",  # bare-except - sometimes needed for cleanup
    "E741",  # ambiguous-variable-name - sometimes l/O are appropriate
    "E902",  # encoding-error - some files have BOM or other encoding issues
    "W293",  # blank-line-with-whitespace - auto-fixed
    "W291",  # trailing-whitespace - auto-fixed
    "B005",  # strip-with-multi-characters - sometimes intentional
    "B008",  # function-call-in-default-argument - FastAPI Depends() pattern
    "B904",  # raise-without-from-inside-except - sometimes intentional
    "F811",  # redefinition - sometimes intentional for overloads
    "S110",  # try-except-pass - sometimes intentional
    "S112",  # try-except-continue - sometimes intentional
    "S310",  # URL open audit - we control the URLs
    "S603",  # subprocess audit - we control the commands
    "UP006", # use-pep585-annotation - keep compatibility with older Python
    "UP007", # use-pep604-annotation - keep compatibility with older Python
    "UP035", # deprecated-import - keep compatibility with older Python
    "UP045", # use-pep604-annotation-optional - keep compatibility with older Python
]

# Per-file ignores
[lint.per-file-ignores]
"**/alembic/**" = ["S608", "E402", "F401"]  # SQL in migrations is intentional, imports after sys.path
"alembic/**" = ["S608", "E402", "F401"]
"*/alembic/*" = ["S608", "E402", "F401"]
"**/tests/**" = ["S101", "S106", "F841", "F401", "B904"]  # asserts, test passwords, unused vars OK
"**/scripts/**" = ["S106", "S603", "S110", "B007", "B904", "F401", "F841", "E701", "E741", "F541"]  # scripts have relaxed requirements
"scripts/**" = ["S106", "S603", "S110", "B007", "B904", "F401", "F841", "E701", "E741", "F541"]  # root scripts
"tools/**" = ["B007", "B904", "S310", "S603", "S607", "F401", "F841"]  # tools scripts have relaxed requirements
"examples/**" = ["F401", "F841", "E701", "E741", "B005"]  # examples have relaxed requirements
"services/auth-service/app/core/security.py" = ["S107"]  # token_type is not a password
"services/auth-service/app/models/schemas.py" = ["S105"]  # token_type field is not a password
"services/auth-service/app/services/auth_service.py" = ["S106"]  # token_type argument is not a password
"audit_log_cli/**" = ["B904", "F401"]  # CLI exit doesn't need exception chaining
"**/core/utils.py" = ["B006", "F401"]  # Mutable defaults and conditional imports are intentional
"dashboard_app/**" = ["E402", "F821", "B904", "F841", "F401", "E701", "E741", "B005"]  # Legacy dashboard app has some issues
"**/enterprise_api/populate_keys.py" = ["F541"]
"**/enterprise_api/scripts/populate_demo_public_key.py" = ["F541"]

[lint.isort]
known-first-party = ["app", "encypher", "encypher_ai", "encypher_enterprise", "encypher_commercial_shared"]
