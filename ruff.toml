# Ruff configuration for EncypherAI Commercial
# https://docs.astral.sh/ruff/configuration/

line-length = 100

[lint]
# Enable these rule categories
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "S",   # flake8-bandit (security)
    "B",   # flake8-bugbear
    "I",   # isort
]

# Ignore these specific rules
ignore = [
    "S101",  # assert - used in tests
    "S104",  # hardcoded-bind-all-interfaces - intentional for Docker
    "S608",  # hardcoded-sql-expression - false positives in Alembic migrations
    "E501",  # line-too-long - handled by formatter
    "W293",  # blank-line-with-whitespace - auto-fixed
    "W291",  # trailing-whitespace - auto-fixed
    "B008",  # function-call-in-default-argument - FastAPI Depends() pattern
    "E712",  # true-false-comparison - SQLAlchemy requires == True/False for SQL generation
]

# Per-file ignores
[lint.per-file-ignores]
"**/alembic/**" = ["S608"]  # SQL in migrations is intentional
"alembic/**" = ["S608"]  # SQL in migrations is intentional
"*/alembic/*" = ["S608"]  # SQL in migrations is intentional
"**/tests/**" = ["S101", "S106"]  # asserts and test passwords OK
"**/scripts/**" = ["S106", "S603", "S110"]  # scripts may use subprocess
"services/auth-service/app/core/security.py" = ["S107"]  # token_type is not a password
"services/auth-service/app/models/schemas.py" = ["S105"]  # token_type field is not a password
"services/auth-service/app/services/auth_service.py" = ["S106"]  # token_type argument is not a password

[lint.isort]
known-first-party = ["app", "encypher"]
